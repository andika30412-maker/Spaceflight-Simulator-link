<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS SHARE REAL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1e293b;
}

.icon{font-size:22px;cursor:pointer}

.container{padding:12px}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.card{
  background:#065f46;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.user{
  font-size:13px;
  color:#ccc;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  font-size:15px;
  cursor:pointer;
}

.open{background:#22c55e}
.delete{background:#ef4444}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  width:95%;
  max-height:90%;
  overflow:auto;
}
</style>
</head>

<body>

<header>
  <div onclick="openAdd()">＋</div>
  <div>🚀 SFS SHARE</div>
  <div onclick="openAdmin()">⚙️</div>
</header>

<div class="container">
  <input id="search" placeholder="Cari...">
  <div id="list"></div>
</div>

<!-- ADD -->
<div class="modal" id="addModal">
  <div class="box">
    <h3>Tambah</h3>

    <input id="user" placeholder="User">
    <input id="name" placeholder="Nama roket">
    <input id="link" placeholder="Link SFS">

    <select id="category">
      <option>Rocket</option>
      <option>Tank</option>
      <option>Ship</option>
    </select>

    <input type="file" id="img" accept="image/*">

    <button onclick="addRocket()" class="open">Simpan</button>
    <button onclick="closeAdd()">Tutup</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin</h3>
    <div id="adminList"></div>
    <button onclick="closeAdmin()">Tutup</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};

/* REALTIME */
db.on("value", snap=>{
  data = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  let arr = Object.entries(data);

  document.getElementById("list").innerHTML =
  arr.map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div class="user">by ${r.user} | ${r.cat}</div>

      <button class="open" onclick="window.open('${r.link}')">Buka</button>

      <button onclick="like('${k}')">❤️ ${r.like||0}</button>

      <input id="c${k}" placeholder="Komentar">
      <button onclick="comment('${k}')">Kirim</button>

      <div>
        ${(r.comments||[]).map(c=>`💬 ${c}<br>`).join("")}
      </div>
    </div>
  `).join("");
}

/* ADD */
function addRocket(){
  let file = img.files[0];
  if(!file) return alert("Foto wajib!");
  if(!name.value) return alert("Nama wajib!");

  let reader = new FileReader();

  reader.onload = function(){
    db.push({
      user:user.value||"user",
      name:name.value,
      link:link.value,
      cat:category.value,
      img:reader.result,
      like:0,
      comments:[]
    });

    closeAdd();
  };

  reader.readAsDataURL(file);
}

/* LIKE */
function like(id){
  let item = data[id];
  db.child(id).update({
    like:(item.like||0)+1
  });
}

/* COMMENT */
function comment(id){
  let input = document.getElementById("c"+id);
  if(!input.value) return;

  let item = data[id];
  let arr = item.comments||[];

  arr.push(input.value);

  db.child(id).update({
    comments:arr
  });

  input.value="";
}

/* ADMIN */
function openAdmin(){
  let pw = prompt("Password:");
  if(pw === "$119617555285jjhcwif9961"){
    adminModal.style.display="flex";
    loadAdmin();
  }else{
    alert("Salah");
  }
}

function loadAdmin(){
  let arr = Object.entries(data);

  adminList.innerHTML = arr.map(([k,r])=>`
    <div class="card">
      <h3>${r.name}</h3>
      <button class="delete" onclick="db.child('${k}').remove()">Hapus</button>
    </div>
  `).join("");
}

/* MODAL */
function openAdd(){addModal.style.display="flex";}
function closeAdd(){addModal.style.display="none";}
function closeAdmin(){adminModal.style.display="none";}

/* SEARCH */
search.oninput = ()=>{
  let v = search.value.toLowerCase();
  render(Object.fromEntries(
    Object.entries(data).filter(([k,r])=>r.name.toLowerCase().includes(v))
  ));
};

</script>

</body>
</html>
