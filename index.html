<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SFS MXZP — Space Blueprint Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --void: #030508;
  --deep: #060b14;
  --surface: #0a1220;
  --surface2: #0e1a2e;
  --surface3: #122038;
  --glass: rgba(10,18,32,0.7);
  --glass2: rgba(255,255,255,0.04);
  --border: rgba(0,200,255,0.1);
  --border2: rgba(0,200,255,0.22);
  --border3: rgba(0,200,255,0.4);
  --cyan: #00c8ff;
  --cyan2: #00e5ff;
  --cyan-dim: rgba(0,200,255,0.15);
  --cyan-glow: 0 0 24px rgba(0,200,255,0.35);
  --amber: #ffb340;
  --amber2: #ffd080;
  --amber-glow: 0 0 24px rgba(255,179,64,0.35);
  --magenta: #ff3cac;
  --green: #00ff88;
  --text: #e2eaf8;
  --text2: #6b82a8;
  --text3: #3d5478;
  --danger: #ff4560;
  --success: #00ff88;
  --radius: 16px;
  --radius2: 24px;
  --radius3: 32px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body.light-mode {
  --void: #eef2f8;
  --deep: #e4ecf7;
  --surface: #ffffff;
  --surface2: #f0f5ff;
  --surface3: #e8f0fe;
  --glass: rgba(255,255,255,0.85);
  --glass2: rgba(0,0,0,0.03);
  --border: rgba(0,120,200,0.12);
  --border2: rgba(0,120,200,0.22);
  --border3: rgba(0,120,200,0.4);
  --text: #0d1f3c;
  --text2: #4a6080;
  --text3: #8aa0c0;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s, color 0.4s;
}
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--cyan); border-radius: 4px; }

#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* MAINTENANCE OVERLAY */
.maintenance-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0a0a2a, #020210);
  z-index: 10000; display: none; flex-direction: column;
  align-items: center; justify-content: center; backdrop-filter: blur(20px);
  animation: fadeInMain 0.5s ease;
}
.maintenance-overlay.active { display: flex; }
@keyframes fadeInMain { from { opacity: 0; } to { opacity: 1; } }
.maintenance-icon { font-size: 80px; animation: spinPulseMain 2s ease infinite; filter: drop-shadow(0 0 20px rgba(0,200,255,0.8)); }
@keyframes spinPulseMain { 0%,100% { transform: scale(1) rotate(0deg); opacity: 0.8; } 50% { transform: scale(1.2) rotate(180deg); opacity: 1; } }
.maintenance-text { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 8px; background: linear-gradient(135deg, #00c8ff, #ffb340, #00ff88); -webkit-background-clip: text; background-clip: text; color: transparent; margin-top: 24px; animation: textGlow 1.5s ease infinite; }
@keyframes textGlow { 0%,100% { text-shadow: 0 0 5px rgba(0,200,255,0.3); } 50% { text-shadow: 0 0 25px rgba(0,200,255,0.8); } }
.maintenance-sub { font-family: var(--font-mono); font-size: 14px; color: var(--text2); margin-top: 16px; letter-spacing: 4px; text-transform: uppercase; }
.maintenance-timer { font-family: var(--font-mono); font-size: 56px; font-weight: 700; color: var(--cyan); margin: 24px 0; padding: 16px 32px; background: rgba(0,200,255,0.1); border-radius: 60px; border: 1px solid rgba(0,200,255,0.3); letter-spacing: 8px; box-shadow: 0 0 30px rgba(0,200,255,0.2); }
.maintenance-progress { width: 300px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; margin: 16px 0; }
.maintenance-progress-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #00c8ff, #ffb340); animation: progressShrink 1200s linear forwards; transform-origin: left; }
@keyframes progressShrink { from { transform: scaleX(1); } to { transform: scaleX(0); } }
.maintenance-note { font-family: var(--font-mono); font-size: 11px; color: var(--text3); margin-top: 32px; padding: 12px 24px; background: rgba(0,0,0,0.4); border-radius: 30px; text-align: center; }
.maintenance-note i { color: var(--cyan); margin-right: 6px; }

/* AUTH SCREEN (diringkas) */
#authScreen { position: fixed; inset: 0; z-index: 500; display: flex; align-items: center; justify-content: center; background: var(--void); overflow: hidden; }
.auth-wrap { position: relative; z-index: 1; width: 90%; max-width: 420px; background: var(--glass); backdrop-filter: blur(32px); border: 1px solid var(--border2); border-radius: var(--radius3); padding: 40px 36px; box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08); }
.auth-logo { text-align: center; margin-bottom: 32px; }
.auth-logo .rocket-icon { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 20px; background: linear-gradient(135deg, rgba(0,200,255,0.2), rgba(0,200,255,0.05)); border: 1px solid var(--border3); font-size: 28px; margin-bottom: 14px; animation: float 4s ease infinite; }
.auth-logo h1 { font-family: var(--font-display); font-size: 32px; letter-spacing: 4px; background: linear-gradient(135deg, #fff 20%, var(--cyan), var(--amber)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.tab-switcher { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: var(--surface); border-radius: 12px; padding: 4px; margin-bottom: 28px; border: 1px solid var(--border); }
.tab-btn { padding: 9px; border: none; border-radius: 9px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; letter-spacing: 2px; cursor: pointer; color: var(--text2); background: transparent; text-transform: uppercase; }
.tab-btn.active { background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); color: var(--void); box-shadow: var(--cyan-glow); }
.inp-group { margin-bottom: 16px; }
.inp-group label { display: block; font-family: var(--font-mono); font-size: 9px; letter-spacing: 2px; color: var(--text2); margin-bottom: 7px; text-transform: uppercase; }
.inp-group input { width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font-body); font-size: 14px; outline: none; }
.inp-group input:focus { border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(0,200,255,0.1), var(--cyan-glow); background: var(--surface2); }
.auth-btn { width: 100%; padding: 14px; margin-top: 6px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.7)); border: none; border-radius: var(--radius); font-family: var(--font-display); font-size: 18px; letter-spacing: 3px; color: var(--void); cursor: pointer; transition: all 0.25s; box-shadow: var(--cyan-glow); }

/* MAIN APP */
#mainApp { display: none; min-height: 100vh; position: relative; z-index: 1; }
.header { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 60px; background: rgba(3,5,8,0.85); backdrop-filter: blur(32px); border-bottom: 1px solid var(--border); }
.header-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, rgba(0,200,255,0.25), rgba(0,200,255,0.05)); border: 1px solid var(--border3); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.header-logo h2 { font-family: var(--font-display); font-size: 22px; letter-spacing: 3px; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-right { display: flex; align-items: center; gap: 8px; }
.hdr-avatar { width: 36px; height: 36px; border-radius: 10px; border: 1px solid var(--border3); display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--cyan), var(--amber)); font-weight: 700; font-size: 14px; color: var(--void); cursor: pointer; overflow: hidden; background-size: cover; background-position: center; }
.hdr-name { font-family: var(--font-mono); font-size: 11px; font-weight: 600; color: var(--text2); cursor: pointer; }
.logout-btn { width: 36px; height: 36px; border-radius: 10px; background: transparent; border: 1px solid var(--border); color: var(--text3); cursor: pointer; transition: 0.2s; font-size: 13px; }
.theme-toggle { width: 36px; height: 36px; border-radius: 10px; background: var(--glass2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text2); cursor: pointer; font-size: 14px; }

.bottom-nav { position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; padding: 6px 8px; background: rgba(6,11,20,0.92); backdrop-filter: blur(32px); border: 1px solid var(--border2); border-radius: 20px; z-index: 100; }
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 18px; border-radius: 14px; cursor: pointer; color: var(--text3); font-family: var(--font-mono); font-size: 9px; letter-spacing: 1px; text-transform: uppercase; }
.nav-item i { font-size: 17px; }
.nav-item.active { color: var(--cyan); background: rgba(0,200,255,0.1); }

.page { display: none; padding: 20px 16px 110px; }
.page.active { display: block; }
.max-w { max-width: 1080px; margin: 0 auto; }

/* Card & Grid (sederhana) */
.search-bar { display: flex; align-items: center; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 18px; margin-bottom: 18px; }
.search-bar i { color: var(--cyan); font-size: 13px; }
.search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-size: 13px; }
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
.chip { padding: 6px 14px; border-radius: 8px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; background: var(--surface); border: 1px solid var(--border); color: var(--text2); cursor: pointer; }
.chip.active { background: rgba(0,200,255,0.12); border-color: var(--cyan); color: var(--cyan); }

.bp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 14px; }
.bp-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; cursor: pointer; position: relative; transition: 0.2s; }
.bp-card:hover { transform: translateY(-3px); border-color: var(--border3); box-shadow: var(--cyan-glow); }
.bp-thumb { width: 100%; aspect-ratio: 1/1; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 48px; overflow: hidden; }
.bp-thumb img { width: 100%; height: 100%; object-fit: cover; }
.bp-body { padding: 10px; }
.bp-user-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.mini-av { width: 24px; height: 24px; border-radius: 6px; background: linear-gradient(135deg, var(--cyan), var(--amber)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: var(--void); background-size: cover; }
.bp-username { font-family: var(--font-mono); font-size: 9px; font-weight: 600; color: var(--amber); cursor: pointer; }
.bp-title { font-size: 12px; font-weight: 600; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-stats { display: flex; gap: 8px; font-size: 9px; color: var(--text2); margin: 4px 0; }
.bp-actions { display: flex; gap: 4px; margin-top: 6px; }
.btn-dl { flex: 1; padding: 4px 0; border-radius: 8px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.7)); border: none; font-family: var(--font-mono); font-size: 8px; font-weight: 700; color: var(--void); cursor: pointer; }
.btn-view { padding: 4px 8px; border-radius: 8px; background: var(--glass2); border: 1px solid var(--border2); font-size: 8px; color: var(--text2); cursor: pointer; }
.bookmark-btn { position: absolute; top: 5px; right: 5px; width: 24px; height: 24px; border-radius: 6px; background: rgba(0,0,0,0.6); border: 1px solid var(--border); color: var(--text2); cursor: pointer; font-size: 10px; display: flex; align-items: center; justify-content: center; }
.bookmark-btn.saved { color: var(--amber); }

.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.section-title { font-family: var(--font-mono); font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: 3px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.section-title::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }

.modal-bg { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.88); backdrop-filter: blur(16px); align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal-box { background: var(--glass); backdrop-filter: blur(32px); border: 1px solid var(--border2); border-radius: var(--radius2); width: 92%; max-width: 460px; max-height: 88vh; overflow-y: auto; padding: 24px; }
.modal-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 2px; color: var(--cyan); margin-bottom: 20px; display: flex; justify-content: space-between; }
.modal-close { background: none; border: 1px solid var(--border); color: var(--text2); font-size: 16px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; }
.modal-inp { width: 100%; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; margin-bottom: 10px; }
.modal-btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn-primary { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: var(--radius); color: var(--void); cursor: pointer; font-weight: 700; }
.modal-btn-secondary { flex: 1; padding: 10px; background: var(--glass2); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); cursor: pointer; }

.toast { position: fixed; bottom: 108px; left: 50%; transform: translateX(-50%); padding: 8px 20px; border-radius: 40px; font-size: 11px; font-weight: 700; z-index: 600; animation: fadeUp 0.2s; background: var(--green); color: var(--void); }
.toast.err { background: var(--danger); color: #fff; }
@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(12px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

#fab { position: fixed; bottom: 90px; right: 20px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.7)); border: none; font-size: 22px; color: var(--void); cursor: pointer; box-shadow: var(--cyan-glow); z-index: 90; }
@keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- MAINTENANCE OVERLAY -->
<div id="maintenanceOverlay" class="maintenance-overlay">
  <div class="maintenance-icon">🪬</div>
  <div class="maintenance-text">MAINTENANCE MODE</div>
  <div class="maintenance-sub">Admin is testing the system</div>
  <div class="maintenance-timer" id="maintenanceTimer">20:00</div>
  <div class="maintenance-progress"><div class="maintenance-progress-bar"></div></div>
  <div class="maintenance-note"><i class="fas fa-sync-alt"></i> System will restart automatically after timer ends</div>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-wrap">
    <div class="auth-logo"><div class="rocket-icon">🚀</div><h1>SFS MXZP</h1><p>Space Blueprint Hub</p></div>
    <div class="tab-switcher"><button class="tab-btn active" onclick="switchTab('login')">LOGIN</button><button class="tab-btn" onclick="switchTab('register')">DAFTAR</button></div>
    <div id="loginForm">
      <div class="inp-group"><label>Username</label><input type="text" id="loginUser" placeholder="Username kamu"></div>
      <div class="inp-group"><label>Password</label><input type="password" id="loginPass" placeholder="••••••••" onkeypress="if(event.key==='Enter')doLogin()"></div>
      <div id="loginErr" style="color:var(--danger);font-size:11px;margin-bottom:10px;min-height:18px;text-align:center;"></div>
      <button class="auth-btn" onclick="doLogin()">MASUK</button>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="inp-group"><label>Username</label><input type="text" id="regUser" placeholder="Min 3 karakter" maxlength="15"></div>
      <div class="inp-group"><label>Password</label><input type="password" id="regPass" placeholder="Min 6 karakter"></div>
      <div class="inp-group"><label>Konfirmasi</label><input type="password" id="regConfirm" placeholder="Ulangi password" onkeypress="if(event.key==='Enter')doRegister()"></div>
      <div id="regErr" style="color:var(--danger);font-size:11px;margin-bottom:10px;min-height:18px;text-align:center;"></div>
      <button class="auth-btn" onclick="doRegister()">DAFTAR</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
  <header class="header">
    <div class="header-logo" onclick="goPage('home')"><div class="logo-mark">🚀</div><div><h2>SFS MXZP</h2><small>Space Blueprint</small></div></div>
    <div class="header-right">
      <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
      <div class="hdr-avatar" id="hdrAv" onclick="goProfile(null)"></div>
      <span class="hdr-name" id="hdrName" onclick="goProfile(null)"></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </header>

  <div class="page active" id="homePage"><div class="max-w"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="homeSearch" placeholder="Cari blueprint..." oninput="renderHome()"></div><div class="chips" id="chipGroup"></div><div id="homeGrid" class="bp-grid"></div></div></div>
  <div class="page" id="savedPage"><div class="max-w"><div class="section-title">📌 Blueprint Tersimpan</div><div id="savedGrid" class="bp-grid"></div></div></div>
  <div class="page" id="profilePage"><div class="max-w" id="profileContent"></div></div>
  <div class="page" id="adminPage"><div class="max-w" id="adminContent"></div></div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="goPage('home')"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="goPage('saved')"><i class="fas fa-bookmark"></i><span>Simpan</span></div>
    <div class="nav-item" id="navAdmin" style="display:none;" onclick="goPage('admin')"><i class="fas fa-crown"></i><span>Admin</span></div>
    <div class="nav-item" onclick="goProfile(null)"><i class="fas fa-user-astronaut"></i><span>Profil</span></div>
  </nav>

  <button id="fab" onclick="openShareModal()">+</button>
</div>

<!-- MODALS -->
<div class="modal-bg" id="shareModal"><div class="modal-box"><div class="modal-title"><span><i class="fas fa-rocket"></i> Share</span><button class="modal-close" onclick="closeM('shareModal')"><i class="fas fa-times"></i></button></div><input class="modal-inp" id="sName" placeholder="Nama Blueprint"><textarea class="modal-inp" id="sDesc" rows="2" placeholder="Deskripsi"></textarea><input class="modal-inp" id="sLink" placeholder="Link Download"><select class="modal-inp" id="sCat"><option>🚀 Rocket</option><option>✈️ Pesawat</option><option>🛰️ Satelit</option><option>🛸 UFO</option></select><input type="file" id="sImg" accept="image/*" onchange="previewShareImg()"><img id="sPreview" class="preview-img" style="width:100%; margin-top:8px; border-radius:10px; display:none;"><div class="modal-btn-row"><button class="modal-btn-primary" onclick="doShare()">Share</button><button class="modal-btn-secondary" onclick="closeM('shareModal')">Batal</button></div></div></div>
<div class="modal-bg" id="detailModal"><div class="modal-box" id="detailBox"></div></div>
<div class="modal-bg" id="followModal"><div class="modal-box"><div class="modal-title"><span id="followModalTitle">Followers</span><button class="modal-close" onclick="closeM('followModal')"><i class="fas fa-times"></i></button></div><div id="followModalList"></div></div></div>
<div class="modal-bg" id="editProfileModal"><div class="modal-box"><div class="modal-title"><span>Edit Profil</span><button class="modal-close" onclick="closeM('editProfileModal')"><i class="fas fa-times"></i></button></div><input class="modal-inp" id="epName" placeholder="Display Name"><textarea class="modal-inp" id="epBio" rows="2" placeholder="Bio"></textarea><input type="file" id="epImg" accept="image/*" onchange="previewEpImg()"><img id="epPreview" style="width:100%; margin-top:8px; border-radius:10px; display:none;"><div class="modal-btn-row"><button class="modal-btn-primary" onclick="saveProfile()">Simpan</button><button class="modal-btn-secondary" onclick="closeM('editProfileModal')">Batal</button></div></div></div>
<div class="modal-bg" id="inputModal"><div class="confirm-box"><span class="confirm-icon">⚙️</span><div class="confirm-title" id="inputModalTitle">Input</div><div class="confirm-msg" id="inputModalMsg"></div><input class="modal-inp" id="inputModalField" type="number"><div class="confirm-btns"><button class="confirm-cancel" onclick="closeM('inputModal')">Batal</button><button class="confirm-ok warn" onclick="inputModalConfirm()">Terapkan</button></div></div></div>
<div class="modal-bg" id="confirmModal"><div class="confirm-box"><span class="confirm-icon">⚠️</span><div class="confirm-title" id="confirmTitle">Konfirmasi</div><div class="confirm-msg" id="confirmMsg"></div><div class="confirm-btns"><button class="confirm-cancel" onclick="closeM('confirmModal')">Batal</button><button class="confirm-ok" id="confirmOkBtn" onclick="confirmAction()">Ya</button></div></div></div>

<script>
// Firebase Config
const firebaseConfig = { apiKey: "AIzaSyDrKldhzV7uVqpjTztcb_ok3-rW0xwirlI", authDomain: "sfs-void.firebaseapp.com", databaseURL: "https://sfs-void-default-rtdb.firebaseio.com", projectId: "sfs-void" };
firebase.initializeApp(firebaseConfig);
const bpRef = firebase.database().ref("blueprints");
const usrRef = firebase.database().ref("users");
const bookmarkRef = firebase.database().ref("bookmarks");

const SPECIAL = { GALACTIC_BOSS: { pw:"nasi_goreng_4ever", role:"admin" }, SPACE_NERD: { pw:"kopi_dulu_bro_2024", role:"dev" } };
let ME = null, allBP = {}, allUsers = {}, currentFilter = "Semua", currentPage = "home", profileTarget = null, myBookmarks = [], isMaintenanceMode = false;
let maintenanceInterval = null, maintenanceTimeLeft = 20 * 60;

// ============ MAINTENANCE MODE CHECK ============
function checkMaintenanceMode() {
  fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json")
    .then(res => res.json())
    .then(data => {
      if (data && data.active) {
        if (!isMaintenanceMode) {
          isMaintenanceMode = true;
          document.getElementById('maintenanceOverlay').classList.add('active');
          maintenanceTimeLeft = 20 * 60;
          if (maintenanceInterval) clearInterval(maintenanceInterval);
          maintenanceInterval = setInterval(() => {
            maintenanceTimeLeft--;
            if (maintenanceTimeLeft <= 0) {
              clearInterval(maintenanceInterval);
              fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json", { method: 'DELETE' });
              location.reload();
            } else {
              const minutes = Math.floor(maintenanceTimeLeft / 60);
              const seconds = maintenanceTimeLeft % 60;
              const timerEl = document.getElementById('maintenanceTimer');
              if (timerEl) timerEl.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
          }, 1000);
        }
      } else if (isMaintenanceMode) {
        isMaintenanceMode = false;
        document.getElementById('maintenanceOverlay').classList.remove('active');
        if (maintenanceInterval) clearInterval(maintenanceInterval);
      }
    }).catch(() => {});
}
setInterval(checkMaintenanceMode, 5000);
checkMaintenanceMode();

// ============ CANVAS STARS ============
(function(){
  const cv = document.getElementById('bgCanvas'), ctx = cv.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  for(let i=0;i<150;i++) stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, a: Math.random(), da: (Math.random()-0.5)*0.005 });
  (function loop(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => { s.a = Math.max(0.05, Math.min(1, s.a + s.da)); if(s.a<=0.05||s.a>=1) s.da*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill(); });
    requestAnimationFrame(loop);
  })();
})();

// ============ UTILS ============
function fmt(n){ if(n>=1e9) return (n/1e9).toFixed(1)+'M'; if(n>=1e6) return (n/1e6).toFixed(1)+'JT'; if(n>=1e3) return (n/1e3).toFixed(1)+'RB'; return String(n); }
function esc(s){ if(!s) return ''; return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toast(msg,type='ok'){ let t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }
function openM(id){ document.getElementById(id).classList.add('open'); }
function isAdmin(u){ return u===Object.keys(SPECIAL)[0] || u===Object.keys(SPECIAL)[1]; }
function toggleTheme(){ document.body.classList.toggle('light-mode'); localStorage.setItem('sfs_theme',document.body.classList.contains('light-mode')?'light':'dark'); }
if(localStorage.getItem('sfs_theme')==='light') document.body.classList.add('light-mode');

function setAvatar(elId,username){ let el=document.getElementById(elId); if(!el) return; let ud=allUsers[username]||{}; if(ud.photoURL){ el.style.backgroundImage=`url(${ud.photoURL})`; el.style.backgroundSize='cover'; el.textContent=''; } else { el.style.backgroundImage=''; el.textContent=(ud.displayName||username).charAt(0).toUpperCase(); } }
function avatarEl(username,size=24){ let ud=allUsers[username]||{}; let init=(ud.displayName||username).charAt(0).toUpperCase(); if(ud.photoURL) return `<div class="mini-av" style="width:${size}px;height:${size}px;background-image:url(${ud.photoURL});background-size:cover;"></div>`; return `<div class="mini-av" style="width:${size}px;height:${size}px;">${init}</div>`; }

// ============ AUTH ============
function switchTab(t){ document.getElementById('loginForm').style.display = t==='login'?'block':'none'; document.getElementById('registerForm').style.display = t==='register'?'block':'none'; document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(t==='login'&&i===0)||(t==='register'&&i===1))); }
async function doLogin(){ let u=document.getElementById('loginUser').value.trim(), p=document.getElementById('loginPass').value; if(!u||!p){ toast('Isi semua kolom','err'); return; } if(SPECIAL[u]){ if(SPECIAL[u].pw===p) finalLogin(u); else toast('Password salah','err'); return; } let snap=await usrRef.child(u).once('value'); if(!snap.exists()){ toast('User tidak ditemukan','err'); return; } if(snap.val().password!==p){ toast('Password salah','err'); return; } finalLogin(u); }
async function doRegister(){ let u=document.getElementById('regUser').value.trim(), p=document.getElementById('regPass').value, c=document.getElementById('regConfirm').value; if(u.length<3){ toast('Username min 3','err'); return; } if(SPECIAL[u]){ toast('Username tidak tersedia','err'); return; } if(p.length<6){ toast('Password min 6','err'); return; } if(p!==c){ toast('Password tidak cocok','err'); return; } let ex=await usrRef.child(u).once('value'); if(ex.exists()){ toast('Username sudah dipakai','err'); return; } await usrRef.child(u).set({username:u,password:p,role:'user',displayName:u,bio:'',photoURL:null,createdAt:Date.now(),followers:{},following:{}}); switchTab('login'); document.getElementById('loginUser').value=u; toast('Daftar berhasil!','ok'); }
function finalLogin(u){ ME=u; localStorage.setItem('sfs_me',u); document.getElementById('authScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; document.getElementById('hdrName').textContent=u; document.getElementById('navAdmin').style.display=isAdmin(u)?'flex':'none'; loadData(); setAvatar('hdrAv',u); goPage('home'); toast(`Selamat datang, ${u}! 🚀`); }
function doLogout(){ localStorage.removeItem('sfs_me'); ME=null; document.getElementById('authScreen').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
function checkSession(){ let s=localStorage.getItem('sfs_me'); if(s) finalLogin(s); }

// ============ DATA LOAD ============
async function loadData(){ 
  bpRef.on('value',async snap=>{ allBP=snap.val()||{}; await loadBookmarks(); if(currentPage==='home') renderHome(); if(currentPage==='admin'&&isAdmin(ME)) renderAdmin(); if(currentPage==='profile') renderProfile(profileTarget); if(currentPage==='saved') renderSaved(); });
  usrRef.on('value',snap=>{ allUsers=snap.val()||{}; if(currentPage==='admin') renderAdmin(); if(currentPage==='profile') renderProfile(profileTarget); setAvatar('hdrAv',ME); });
}
function goPage(p){ document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active')); currentPage=p; document.getElementById(p+'Page').classList.add('active'); if(p==='home') renderHome(); if(p==='admin'&&isAdmin(ME)) renderAdmin(); if(p==='saved') renderSaved(); }
function goProfile(username){ profileTarget=username||ME; currentPage='profile'; document.querySelectorAll('.page').forEach(el=>el.classList.remove('active')); document.getElementById('profilePage').classList.add('active'); renderProfile(profileTarget); }

// ============ HOME ============
const CATS=["Semua","🚀 Rocket","✈️ Pesawat","🛰️ Satelit","🛸 UFO"];
function renderHome(){ let chips=document.getElementById('chipGroup'); chips.innerHTML=CATS.map(c=>`<div class="chip ${currentFilter===c?'active':''}" onclick="setFilter('${c}')">${c}</div>`).join(''); let term=(document.getElementById('homeSearch')?.value||'').toLowerCase(); let entries=Object.entries(allBP).filter(([k,i])=>!i.banned); if(currentFilter!=='Semua') entries=entries.filter(([k,i])=>i.cat===currentFilter); if(term) entries=entries.filter(([k,i])=>(i.name||'').toLowerCase().includes(term)||(i.user||'').toLowerCase().includes(term)); entries.sort((a,b)=>b[1].created-a[1].created); let grid=document.getElementById('homeGrid'); if(!entries.length){ grid.innerHTML='<div class="empty"><span class="ei">🔭</span><h3>Belum ada blueprint</h3><p>Jadilah yang pertama share!</p></div>'; return; } grid.innerHTML=entries.map(([id,item])=>bpCard(id,item)).join(''); }
function setFilter(c){ currentFilter=c; renderHome(); }
function bpCard(id,item){ let liked=item.likes&&item.likes[ME]; return `<div class="bp-card"><div class="bp-thumb">${item.img?`<img src="${item.img}" onclick="openDetail('${id}')">`:`<div class="bp-thumb-fallback" onclick="openDetail('${id}')">🚀</div>`}</div><div class="bp-body"><div class="bp-user-row">${avatarEl(item.user)}<span class="bp-username" onclick="goProfile('${esc(item.user)}')">${esc(item.user)}</span></div><div class="bp-title" onclick="openDetail('${id}')">${esc(item.name)}</div><div class="bp-stats"><span class="like-btn ${liked?'liked':''}" onclick="toggleLike('${id}')"><i class="${liked?'fas':'far'} fa-heart"></i> ${fmt(Object.keys(item.likes||{}).length)}</span><span><i class="far fa-eye"></i> ${fmt(item.views||0)}</span></div><div class="bp-actions"><button class="btn-dl" onclick="window.open('${esc(item.link)}','_blank')">DL</button><button class="btn-view" onclick="openDetail('${id}')">Lihat</button></div></div><button class="bookmark-btn ${isBookmarked(id)?'saved':''}" onclick="toggleBookmark('${id}')"><i class="fas fa-bookmark"></i></button></div>`; }
async function toggleLike(id){ let item=allBP[id]; if(!item) return; let likes={...item.likes||{}}; if(likes[ME]) delete likes[ME]; else likes[ME]=true; await bpRef.child(id).update({likes}); if(currentPage==='home') renderHome(); else if(currentPage==='saved') renderSaved(); }

async function openDetail(id){ let item=allBP[id]; if(!item) return; await bpRef.child(id).update({views:(item.views||0)+1}); item=allBP[id]||item; let liked=item.likes&&item.likes[ME]; let comments=item.comments||[]; let isOwner=ME===item.user||isAdmin(ME); let imgBlock=item.img?`<img src="${item.img}" style="width:100%;border-radius:12px;margin-bottom:12px;">`:''; document.getElementById('detailBox').innerHTML=`<div class="modal-title"><span>${esc(item.name)}</span><button class="modal-close" onclick="closeM('detailModal')"><i class="fas fa-times"></i></button></div>${imgBlock}<div class="bp-user-row" onclick="closeM('detailModal');goProfile('${esc(item.user)}')">${avatarEl(item.user,36)}<div><strong>${esc(item.user)}</strong><div class="cat-badge" style="font-size:8px;">${esc(item.cat)}</div></div></div><div class="detail-desc">${item.desc?esc(item.desc):''}</div><div class="detail-stats"><span class="like-btn ${liked?'liked':''}" onclick="toggleLike('${id}');openDetail('${id}')"><i class="${liked?'fas':'far'} fa-heart"></i> ${fmt(Object.keys(item.likes||{}).length)}</span><span><i class="far fa-eye"></i> ${fmt(item.views||0)}</span></div>${isOwner?`<button class="btn-dl" style="margin-bottom:10px;width:100%;background:#ef4444;" onclick="confirmDeleteBP('${id}')">Hapus</button>`:''}<button class="btn-dl" style="margin-bottom:16px;width:100%;" onclick="window.open('${esc(item.link)}','_blank')">Download</button><div class="section-title">Komentar</div><div style="display:flex;gap:8px;margin-bottom:12px;"><input class="modal-inp" id="cmtInput" placeholder="Tulis komentar..." style="margin:0;"><button class="btn-dl" style="padding:0 12px;" onclick="addComment('${id}')">Kirim</button></div><div id="cmtList">${comments.slice().reverse().map(c=>`<div class="comment" style="background:rgba(0,0,0,0.3);padding:8px;border-radius:10px;margin-bottom:6px;"><div class="comment-user" style="cursor:pointer;font-weight:bold;color:var(--amber);" onclick="closeM('detailModal');goProfile('${esc(c.user)}')">${esc(c.user)}</div><div>${esc(c.text)}</div></div>`).join('')}</div>`; openM('detailModal'); }
async function addComment(id){ let txt=document.getElementById('cmtInput')?.value.trim(); if(!txt) return; let item=allBP[id]; let comments=[...(item.comments||[]),{user:ME,text:txt,time:Date.now()}]; await bpRef.child(id).update({comments}); openDetail(id); }
function confirmDeleteBP(id){ if(confirm('Hapus blueprint?')){ bpRef.child(id).remove(); closeM('detailModal'); toast('Blueprint dihapus'); } }

// ============ BOOKMARK ============
async function loadBookmarks(){ if(!ME) return; let s=await bookmarkRef.child(ME).once('value'); myBookmarks=s.val()?Object.keys(s.val()):[]; }
async function toggleBookmark(id){ if(!ME) return; let s=await bookmarkRef.child(ME).child(id).once('value'); if(s.exists()){ await bookmarkRef.child(ME).child(id).remove(); myBookmarks=myBookmarks.filter(b=>b!==id); toast('Dihapus dari simpanan'); } else { await bookmarkRef.child(ME).child(id).set(true); myBookmarks.push(id); toast('Tersimpan!'); } if(currentPage==='saved') renderSaved(); else renderHome(); }
function isBookmarked(id){ return myBookmarks.includes(id); }
async function renderSaved(){ let saved=Object.entries(allBP).filter(([id])=>myBookmarks.includes(id)&&!allBP[id]?.banned); let g=document.getElementById('savedGrid'); if(!saved.length){ g.innerHTML='<div class="empty"><span class="ei">📌</span><h3>Belum ada yang tersimpan</h3></div>'; return; } g.innerHTML=saved.map(([id,i])=>bpCard(id,i)).join(''); }

// ============ SHARE ============
function openShareModal(){ document.getElementById('sName').value=''; document.getElementById('sDesc').value=''; document.getElementById('sLink').value=''; document.getElementById('sImg').value=''; document.getElementById('sPreview').style.display='none'; openM('shareModal'); }
function previewShareImg(){ let f=document.getElementById('sImg').files[0]; if(f){ let r=new FileReader(); r.onload=e=>{ document.getElementById('sPreview').src=e.target.result; document.getElementById('sPreview').style.display='block'; }; r.readAsDataURL(f); } }
function doShare(){ let name=document.getElementById('sName').value.trim(), link=document.getElementById('sLink').value.trim(); if(!name){ toast('Nama wajib diisi','err'); return; } let file=document.getElementById('sImg').files[0]; if(!file){ toast('Upload gambar','err'); return; } let reader=new FileReader(); reader.onload=()=>{ bpRef.push({user:ME,name,desc:document.getElementById('sDesc').value.trim(),link:link||'#',cat:document.getElementById('sCat').value,img:reader.result,views:0,likes:{},comments:[],created:Date.now()}); closeM('shareModal'); toast('Blueprint dishare! 🚀'); }; reader.readAsDataURL(file); }

// ============ PROFILE ============
async function renderProfile(username){ let ud=allUsers[username]||{}; let isSpecial=SPECIAL[username]; let displayName=isSpecial?(username==='GALACTIC_BOSS'?'🌌 BOSS':username):(ud.displayName||username); let myBP=Object.entries(allBP).filter(([k,i])=>i.user===username&&!i.banned); let followers=Object.keys(ud.followers||{}).length; let following=Object.keys(ud.following||{}).length; let totalViews=myBP.reduce((s,[k,i])=>s+(i.views||0),0); let isOwn=ME===username; let photo=ud.photoURL; let avStyle=photo?`background-image:url(${photo});background-size:cover;`:'';
document.getElementById('profileContent').innerHTML=`<div class="profile-hero"><div class="p-av-wrap"><div class="profile-av" style="${avStyle}">${photo?'':displayName.charAt(0).toUpperCase()}${isOwn?'<div class="av-cam" onclick="openEditProfile()"><i class="fas fa-camera"></i></div>':''}</div></div><div class="profile-name">${esc(displayName)}</div><div class="profile-handle">@${esc(username)}</div><div class="profile-stats-row"><div class="p-stat" onclick="showFollowList('${username}','followers')"><div class="p-stat-v">${fmt(followers)}</div><div class="p-stat-l">Followers</div></div><div class="p-stat" onclick="showFollowList('${username}','following')"><div class="p-stat-v">${fmt(following)}</div><div class="p-stat-l">Following</div></div><div class="p-stat"><div class="p-stat-v">${myBP.length}</div><div class="p-stat-l">BP</div></div><div class="p-stat"><div class="p-stat-v">${fmt(totalViews)}</div><div class="p-stat-l">Views</div></div></div>${isOwn?`<button class="edit-btn" onclick="openEditProfile()">Edit Profil</button>`:`<button class="follow-btn-lg ${ud.followers&&ud.followers[ME]?'following':''}" onclick="toggleFollow('${username}')">${ud.followers&&ud.followers[ME]?'Unfollow':'Follow'}</button>`}</div><div class="section-title">Blueprint</div><div class="bp-grid">${myBP.length?myBP.map(([id,item])=>bpCard(id,item)).join(''):'<div class="empty"><span class="ei">🛸</span><h3>Belum ada blueprint</h3></div>'}</div>`; }
async function toggleFollow(target){ if(target===ME) return; let td=(await usrRef.child(target).once('value')).val()||{},md=(await usrRef.child(ME).once('value')).val()||{}; let tf={...td.followers||{}},mf={...md.following||{}}; if(tf[ME]){ delete tf[ME]; delete mf[target]; toast(`Berhenti follow ${target}`); } else { tf[ME]=true; mf[target]=true; toast(`Follow ${target}`); } await usrRef.child(target).update({followers:tf}); await usrRef.child(ME).update({following:mf}); renderProfile(target); }
async function showFollowList(username,type){ let ud=(await usrRef.child(username).once('value')).val()||{}; let list=Object.keys(type==='followers'?(ud.followers||{}):(ud.following||{})); document.getElementById('followModalTitle').innerHTML=`${type} @${esc(username)}`; let cont=document.getElementById('followModalList'); if(!list.length){ cont.innerHTML='<div style="text-align:center;padding:24px;">Tidak ada</div>'; openM('followModal'); return; } cont.innerHTML=list.map(u=>`<div class="follow-list-item" onclick="closeM('followModal');goProfile('${esc(u)}')">${avatarEl(u,36)}<div><div class="fl-name">${esc(allUsers[u]?.displayName||u)}</div><div class="fl-handle">@${esc(u)}</div></div></div>`).join(''); openM('followModal'); }
function openEditProfile(){ let ud=allUsers[ME]||{}; document.getElementById('epName').value=ud.displayName||ME; document.getElementById('epBio').value=ud.bio||''; openM('editProfileModal'); }
function previewEpImg(){ let f=document.getElementById('epImg').files[0]; if(f){ let r=new FileReader(); r.onload=e=>{ document.getElementById('epPreview').src=e.target.result; document.getElementById('epPreview').style.display='block'; }; r.readAsDataURL(f); } }
async function saveProfile(){ let name=document.getElementById('epName').value.trim()||ME, bio=document.getElementById('epBio').value.trim(), file=document.getElementById('epImg').files[0]; let updates={displayName:name,bio}; if(file){ let r=new FileReader(); r.onload=async()=>{ updates.photoURL=r.result; await usrRef.child(ME).update(updates); closeM('editProfileModal'); setAvatar('hdrAv',ME); renderProfile(ME); toast('Profil diupdate'); }; r.readAsDataURL(file); return; } await usrRef.child(ME).update(updates); closeM('editProfileModal'); setAvatar('hdrAv',ME); renderProfile(ME); toast('Profil diupdate'); }

// ============ ADMIN ============
function renderAdmin(){ if(!isAdmin(ME)){ document.getElementById('adminContent').innerHTML='<div class="empty"><span class="ei">🔒</span><h3>Akses Ditolak</h3></div>'; return; } let totalBP=Object.keys(allBP).length, totalUsers=Object.keys(allUsers).length; document.getElementById('adminContent').innerHTML=`<div class="admin-header"><div class="section-title">🛸 Admin Panel</div><div class="admin-grid"><div class="admin-stat-box"><div class="asv">${totalBP}</div><div>Blueprint</div></div><div class="admin-stat-box"><div class="asv">${totalUsers}</div><div>Users</div></div></div></div><div class="section-title">User Management</div>${Object.entries(allUsers).map(([u,d])=>`<div class="admin-item"><div class="admin-item-top"><div>${avatarEl(u,32)}</div><div><div class="admin-item-name">${esc(d.displayName||u)}</div><div class="admin-item-sub">@${esc(u)} • ${fmt(Object.keys(d.followers||{}).length)} followers</div></div></div><div class="admin-btns"><button class="adm-btn" onclick="adminAddFollowers('${u}')">+Followers</button><button class="adm-btn success" onclick="adminVerify('${u}')">Verify</button><button class="adm-btn danger" onclick="adminDeleteUser('${u}')">Hapus</button></div></div>`).join('')}<div class="section-title" style="margin-top:20px;">System Tools</div><button class="adm-btn maintenance" style="width:100%;padding:10px;" onclick="startMaintenanceManual()"><i class="fas fa-hammer"></i> MAINTENANCE MODE (20 Menit)</button>`; }
function startMaintenanceManual(){ if(confirm('⚠️ Maintenance mode akan mengunci website selama 20 menit. Lanjutkan?')){ fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json",{method:"PUT",body:JSON.stringify({active:true,started:Date.now()})}).then(()=>{ toast('Maintenance mode diaktifkan!'); checkMaintenanceMode(); }); } }
let _confirmCb=null; function showConfirm({cb}){ _confirmCb=cb; openM('confirmModal'); } function confirmAction(){ closeM('confirmModal'); if(_confirmCb) _confirmCb(); _confirmCb=null; }
let _inputCb=null; function showInputModal({cb}){ _inputCb=cb; openM('inputModal'); } function inputModalConfirm(){ let val=document.getElementById('inputModalField').value; closeM('inputModal'); if(_inputCb) _inputCb(val); _inputCb=null; }
function randomUsername(){ const a=['cosmic','stellar','nova','astro']; const n=['pilot','ranger','walker']; return `${a[Math.floor(Math.random()*a.length)]}_${n[Math.floor(Math.random()*n.length)]}_${Math.floor(Math.random()*9000)+1000}`; }
window.adminAddFollowers=function(u){ showInputModal({cb:async(amt)=>{ let num=Math.abs(parseInt(amt))||100; let ud=(await usrRef.child(u).once('value')).val()||{},fol={...ud.followers||{}}; for(let i=0;i<num;i++) fol[randomUsername()]=true; await usrRef.child(u).update({followers:fol}); toast(`+${fmt(num)} followers ke ${u}`); if(currentPage==='admin') renderAdmin(); }}); document.getElementById('inputModalTitle').textContent='Tambah Followers'; document.getElementById('inputModalMsg').innerHTML=`Ke akun @${u}`; };
window.adminVerify=async function(u){ await usrRef.child(u).update({verified:true}); toast(`✅ ${u} diverifikasi`); if(currentPage==='admin') renderAdmin(); };
window.adminDeleteUser=function(u){ showConfirm({cb:async()=>{ await usrRef.child(u).remove(); let del=Object.entries(allBP).filter(([k,i])=>i.user===u).map(([k])=>k); for(let id of del) await bpRef.child(id).remove(); toast(`User ${u} dihapus`); if(currentPage==='admin') renderAdmin(); }}); document.getElementById('confirmTitle').textContent='Hapus User'; document.getElementById('confirmMsg').innerHTML=`Hapus user @${u} beserta semua blueprint-nya?`; };
document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{ if(e.target===m) m.classList.remove('open'); }));
checkSession();
</script>
</body>
</html>
