<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS Share</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}

header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px;background:#1e293b;position:relative
}
.icon{font-size:22px;cursor:pointer;padding:8px}

.container{padding:12px}

input{
  width:100%;padding:12px;margin:6px 0;
  border:none;border-radius:8px;font-size:16px
}

.card{
  background:#065f46;padding:12px;border-radius:12px;margin-top:12px
}
.card img{width:100%;border-radius:10px}

.user{font-size:13px;color:#ccc}

button{
  width:100%;padding:12px;margin-top:6px;
  border:none;border-radius:8px;font-size:16px;cursor:pointer
}
.open{background:#22c55e}
.delete{background:#ef4444}

/* modal */
.modal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7);justify-content:center;align-items:center
}
.box{
  background:#020617;padding:15px;border-radius:12px;
  width:95%;max-height:90%;overflow:auto
}

/* menu */
#menu{
  display:none;position:absolute;top:55px;left:10px;
  background:#1e293b;padding:10px;border-radius:12px;width:200px
}
#menu div{padding:12px;border-radius:8px}
#menu div:hover{background:#334155}
</style>
</head>

<body>

<header>
  <div class="icon" onclick="toggleMenu()">⋮</div>
  <div>🚀 SFS Share</div>
  <div class="icon" onclick="openAdd()">＋</div>

  <div id="menu">
    <div onclick="focusSearch()">🔍 Cari</div>
    <div onclick="openAdd()">➕ Tambah</div>
    <div onclick="openAdmin()">⚙️ Admin</div>
  </div>
</header>

<div class="container">
  <input id="search" placeholder="Cari roket...">
  <div id="list"></div>
</div>

<!-- TAMBAH -->
<div class="modal" id="addModal">
  <div class="box">
    <h3>Tambah</h3>

    <input id="username" placeholder="Nama user (opsional)">
    <input id="name" placeholder="Nama roket (wajib)">
    <input id="link" placeholder="Link SFS">
    <input type="file" id="imgInput" accept="image/*">

    <button class="open" onclick="saveRocket()">Simpan</button>
    <button onclick="closeAdd()">Batal</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin</h3>
    <div id="adminList"></div>
    <button onclick="closeAdmin()">Tutup</button>
  </div>
</div>

<script>
let rockets = JSON.parse(localStorage.getItem("rockets")) || [];

const list = document.getElementById("list");
const search = document.getElementById("search");
const addModal = document.getElementById("addModal");
const adminModal = document.getElementById("adminModal");
const menu = document.getElementById("menu");

const username = document.getElementById("username");
const nameInput = document.getElementById("name");
const link = document.getElementById("link");
const imgInput = document.getElementById("imgInput");
const adminList = document.getElementById("adminList");

/* MENU */
function toggleMenu(){
  menu.style.display = menu.style.display==="none"?"block":"none";
}
document.addEventListener("click",function(e){
  if(!e.target.closest("#menu") && !e.target.classList.contains("icon")){
    menu.style.display="none";
  }
});
function focusSearch(){
  menu.style.display="none";
  search.focus();
}

/* RENDER */
function render(data=rockets){
  list.innerHTML = data.map(r=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div class="user">by ${r.user}</div>
      <button class="open" onclick="openLink('${r.link}')">Buka</button>
    </div>
  `).join("");
}
render();

/* SEARCH */
search.addEventListener("input",function(){
  let val = search.value.toLowerCase();
  render(rockets.filter(r=>r.name.toLowerCase().includes(val)));
});

/* LINK */
function openLink(l){
  if(!l) return alert("Link kosong!");
  window.open(l,"_blank");
}

/* ADD */
function openAdd(){addModal.style.display="flex";}
function closeAdd(){addModal.style.display="none";}

function saveRocket(){
  let file = imgInput.files[0];

  if(!file){alert("Foto wajib!");return;}
  if(!nameInput.value.trim()){alert("Nama roket wajib!");return;}

  let reader = new FileReader();
  reader.onload = function(){
    rockets.push({
      user: username.value.trim() || "user",
      name: nameInput.value.trim(),
      link: link.value || "",
      img: reader.result
    });

    localStorage.setItem("rockets",JSON.stringify(rockets));
    render();
    closeAdd();

    username.value="";
    nameInput.value="";
    link.value="";
    imgInput.value="";
  };
  reader.readAsDataURL(file);
}

/* ADMIN */
function openAdmin(){
  let pw = prompt("Password:");
  if(pw === "$119617555285jjhcwif9961"){
    adminModal.style.display="flex";
    loadAdmin();
  } else {
    alert("Salah");
  }
}
function closeAdmin(){adminModal.style.display="none";}

function loadAdmin(){
  adminList.innerHTML = rockets.map((r,i)=>`
    <div class="card">
      <h3>${r.name}</h3>
      <div class="user">${r.user}</div>
      <button class="delete" onclick="del(${i})">Hapus</button>
    </div>
  `).join("");
}

function del(i){
  if(!confirm("Hapus?")) return;

  rockets.splice(i,1);
  localStorage.setItem("rockets",JSON.stringify(rockets));

  loadAdmin();
  render();
}
</script>

</body>
</html>
