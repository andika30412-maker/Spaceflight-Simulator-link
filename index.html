<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS SHARE REAL</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff}

header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1e293b;
}

.icon{font-size:22px;cursor:pointer}

.container{padding:12px}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.card{
  background:#065f46;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

.user{
  font-size:13px;
  color:#ccc;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  font-size:16px;
}

.open{background:#22c55e}
.delete{background:#ef4444}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  width:95%;
  max-height:90%;
  overflow:auto;
}

/* MENU */
#menu{
  display:none;
  position:absolute;
  top:50px;
  left:10px;
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  width:200px;
}

#menu div{
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

#menu div:hover{
  background:#334155;
}
</style>
</head>

<body>

<header>
  <div class="icon" onclick="toggleMenu()">⋮</div>
  <div>🚀 SFS SHARE</div>
  <div class="icon" onclick="openAdd()">＋</div>

  <div id="menu">
    <div onclick="focusSearch()">🔍 Cari</div>
    <div onclick="openAdd()">➕ Tambah</div>
    <div onclick="openAdmin()">⚙️ Admin</div>
  </div>
</header>

<div class="container">
  <input id="search" placeholder="Cari roket...">
  <div id="list"></div>
</div>

<!-- ADD -->
<div class="modal" id="addModal">
  <div class="box">
    <h3>Tambah Rocket</h3>

    <input id="user" placeholder="Nama user">
    <input id="name" placeholder="Nama roket (wajib)">
    <input id="link" placeholder="Link SFS">
    <input type="file" id="img" accept="image/*">

    <button class="open" onclick="addRocket()">Simpan</button>
    <button onclick="closeAdd()">Batal</button>
  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>Admin Panel</h3>
    <div id="adminList"></div>
    <button onclick="closeAdmin()">Tutup</button>
  </div>
</div>

<script>

/* 🔥 FIREBASE KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061",
  storageBucket: "sfs-share-37061.firebasestorage.app",
  messagingSenderId: "464559746113",
  appId: "1:464559746113:web:2318cf9a65c8bdce2b6ac0"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("rockets");

let data = [];

/* REALTIME LOAD */
db.on("value", snap=>{
  let val = snap.val() || {};
  data = Object.values(val);
  render(data);
});

/* RENDER */
function render(list){
  document.getElementById("list").innerHTML =
  list.map(r=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div class="user">by ${r.user}</div>
      <button class="open" onclick="window.open('${r.link}')">Buka</button>
    </div>
  `).join("");
}

/* ADD */
function addRocket(){
  let file = img.files[0];

  if(!file) return alert("Foto wajib!");
  if(!name.value.trim()) return alert("Nama wajib!");

  let reader = new FileReader();

  reader.onload = function(){

    db.push({
      user: user.value || "user",
      name: name.value,
      link: link.value,
      img: reader.result
    });

    alert("Tersimpan semua HP!");
    closeAdd();
  };

  reader.readAsDataURL(file);
}

/* MENU */
function toggleMenu(){
  menu.style.display = menu.style.display==="none"?"block":"none";
}

function focusSearch(){
  menu.style.display="none";
  search.focus();
}

/* SEARCH */
search.oninput = ()=>{
  let v = search.value.toLowerCase();
  render(data.filter(r=>r.name.toLowerCase().includes(v)));
};

/* MODAL */
function openAdd(){addModal.style.display="flex";}
function closeAdd(){addModal.style.display="none";}

/* ADMIN */
function openAdmin(){
  let pw = prompt("Password:");
  if(pw === "$119617555285jjhcwif9961"){
    adminModal.style.display="flex";
    loadAdmin();
  } else {
    alert("Salah!");
  }
}

function closeAdmin(){adminModal.style.display="none";}

function loadAdmin(){
  db.once("value", snap=>{
    let val = snap.val() || {};
    let arr = Object.entries(val);

    document.getElementById("adminList").innerHTML =
    arr.map(([key,r])=>`
      <div class="card">
        <h3>${r.name}</h3>
        <button class="delete" onclick="del('${key}')">Hapus</button>
      </div>
    `).join("");
  });
}

function del(key){
  if(confirm("Hapus?")){
    db.child(key).remove();
  }
}

</script>

</body>
</html>
