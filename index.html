<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SFS SHARE - Premium Item Catalog</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1e1b2e 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #22c55e, #10b981); border-radius: 10px; }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 28px;
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid rgba(34, 197, 94, 0.3);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .logo-img {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      object-fit: cover;
      border: 2px solid rgba(34, 197, 94, 0.5);
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #22c55e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 10px;
      color: #94a3b8;
    }

    .header-actions { display: flex; gap: 12px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .icon-btn:hover {
      background: linear-gradient(135deg, #22c55e, #10b981);
      transform: translateY(-2px);
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: white;
      font-size: 10px;
      font-weight: bold;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Search */
    .search-container {
      padding: 20px 28px;
      background: rgba(0,0,0,0.3);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .search-wrapper {
      flex: 1;
      min-width: 240px;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
    }

    #search {
      width: 100%;
      padding: 12px 20px 12px 48px;
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      background: rgba(30,41,59,0.8);
      color: white;
      font-size: 14px;
    }

    #search:focus {
      outline: none;
      border-color: #22c55e;
    }

    .filter-group { display: flex; gap: 10px; flex-wrap: wrap; }

    .filter-chip {
      padding: 8px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 30px;
      color: #cbd5e1;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .filter-chip:hover {
      background: rgba(34,197,94,0.2);
      border-color: #22c55e;
    }

    .filter-chip.active {
      background: linear-gradient(135deg, #22c55e, #10b981);
      color: white;
    }

    /* Stats */
    .stats-bar {
      padding: 10px 28px;
      display: flex;
      justify-content: space-between;
      background: rgba(0,0,0,0.2);
      font-size: 13px;
      color: #94a3b8;
    }

    /* Container & Grid */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }

    /* Product Card */
    .product-card {
      background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(15,23,42,0.9));
      border-radius: 24px;
      overflow: hidden;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .product-card:hover {
      transform: translateY(-5px);
      border-color: rgba(34,197,94,0.4);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .card-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: linear-gradient(135deg, #22c55e, #10b981);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: bold;
      z-index: 2;
    }

    .product-image {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #1e293b, #0f172a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
    }

    .product-info { padding: 16px; }

    .product-name {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 6px;
      color: white;
    }

    .product-category {
      font-size: 11px;
      color: #22c55e;
      background: rgba(34,197,94,0.15);
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }

    .product-desc {
      font-size: 12px;
      color: #94a3b8;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .product-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .product-price {
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .add-to-cart {
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.4);
      padding: 8px 16px;
      border-radius: 30px;
      color: #22c55e;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .add-to-cart:hover {
      background: #22c55e;
      color: white;
    }

    /* Empty & Loading */
    .empty-state {
      text-align: center;
      padding: 60px;
    }
    .empty-state i { font-size: 64px; color: #334155; margin-bottom: 16px; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #22c55e;
      color: white;
      padding: 12px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #1e293b;
      border-radius: 24px;
      max-width: 450px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-size: 20px;
      font-weight: bold;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .cart-total {
      margin-top: 16px;
      padding-top: 16px;
      font-size: 18px;
      font-weight: bold;
      text-align: right;
    }
    #checkoutBtn {
      width: 100%;
      margin-top: 16px;
      padding: 12px;
      background: #22c55e;
      border: none;
      border-radius: 16px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      header { padding: 12px 16px; }
      .logo-text { font-size: 18px; }
      .search-container { padding: 12px 16px; }
      .container { padding: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" id="logoHome">
    <img src="logo.jpg" alt="SFS" class="logo-img" onerror="this.src='https://placehold.co/48x48/22c55e/white?text=SFS'">
    <div>
      <div class="logo-text">SFS SHARE</div>
      <div class="logo-sub">Premium Catalog</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-cart"></i><span class="cart-badge" id="cartCount">0</span></button>
    <button class="icon-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
  </div>
</header>

<div class="search-container">
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Cari item favorit...">
  </div>
  <div class="filter-group" id="filterGroup"></div>
</div>

<div class="stats-bar">
  <span id="itemCount">Memuat item...</span>
  <span><i class="fas fa-fire"></i> SFS Trendi ✦</span>
</div>

<div class="container">
  <div class="product-grid" id="productGrid"></div>
</div>

<div id="cartModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <span><i class="fas fa-shopping-cart"></i> Keranjang</span>
      <button class="icon-btn" id="closeModalBtn" style="width:32px;height:32px;">✕</button>
    </div>
    <div id="cartItems"></div>
    <div class="cart-total" id="cartTotal">Total: Rp 0</div>
    <button id="checkoutBtn">🎉 Checkout</button>
  </div>
</div>

<script>
  // Data Demo
  const demoItems = [
    { id: "1", name: "Keyboard Mechanical RGB", category: "Elektronik", price: 450000, desc: "Switch blue, full RGB, anti-ghosting", imageIcon: "fas fa-keyboard", stock: 12 },
    { id: "2", name: "Mouse Gaming Wireless", category: "Elektronik", price: 275000, desc: "DPI 16000, 7 tombol", imageIcon: "fas fa-mouse", stock: 8 },
    { id: "3", name: "Headset Gaming 7.1", category: "Audio", price: 380000, desc: "Virtual surround, mic noise canceling", imageIcon: "fas fa-headphones", stock: 15 },
    { id: "4", name: "Smartwatch Pro", category: "Gadget", price: 650000, desc: "Monitor heart rate, tahan air IP68", imageIcon: "fas fa-clock", stock: 5 },
    { id: "5", name: "Power Bank 20000mAh", category: "Aksesoris", price: 185000, desc: "Fast charging, dual USB", imageIcon: "fas fa-battery-full", stock: 20 },
    { id: "6", name: "Webcam Full HD", category: "Elektronik", price: 320000, desc: "1080p, auto focus", imageIcon: "fas fa-video", stock: 7 },
    { id: "7", name: "Meja Gaming RGB", category: "Furniture", price: 1250000, desc: "Desain ergonomis", imageIcon: "fas fa-chair", stock: 3 },
    { id: "8", name: "Microphone Condenser", category: "Audio", price: 520000, desc: "Kualitas studio", imageIcon: "fas fa-microphone", stock: 9 },
    { id: "9", name: "SSD 1TB NVMe", category: "Komponen", price: 950000, desc: "Kecepatan baca 3500MB/s", imageIcon: "fas fa-hdd", stock: 11 },
    { id: "10", name: "Kursi Gaming", category: "Furniture", price: 1890000, desc: "Punggung tinggi", imageIcon: "fas fa-couch", stock: 4 }
  ];

  let allItems = [...demoItems];
  let filteredItems = [];
  let cart = [];
  let currentCategory = "Semua";

  function loadItems() {
    allItems = [...demoItems];
    applyFilters();
  }

  function applyFilters() {
    let searchTerm = document.getElementById('search').value.toLowerCase();
    let filtered = allItems.filter(item => 
      item.name.toLowerCase().includes(searchTerm) || 
      (item.desc && item.desc.toLowerCase().includes(searchTerm))
    );
    if (currentCategory !== "Semua") {
      filtered = filtered.filter(item => item.category === currentCategory);
    }
    filteredItems = filtered;
    document.getElementById('itemCount').innerHTML = `<i class="fas fa-box"></i> ${filteredItems.length} item`;
    renderProducts();
    renderCategories();
  }

  function renderProducts() {
    const grid = document.getElementById('productGrid');
    if (filteredItems.length === 0) {
      grid.innerHTML = `<div class="empty-state"><i class="fas fa-box-open"></i><h3>Tidak ada item</h3></div>`;
      return;
    }
    grid.innerHTML = filteredItems.map(item => `
      <div class="product-card" data-id="${item.id}">
        ${item.stock < 5 ? '<div class="card-badge">🔥 Stok Terbatas</div>' : ''}
        <div class="product-image"><i class="${item.imageIcon}"></i></div>
        <div class="product-info">
          <div class="product-name">${escapeHtml(item.name)}</div>
          <div class="product-category">${item.category}</div>
          <div class="product-desc">${escapeHtml(item.desc)}</div>
          <div class="product-footer">
            <div class="product-price">Rp ${item.price.toLocaleString('id-ID')}</div>
            <div class="add-to-cart" data-id="${item.id}" data-name="${escapeHtml(item.name)}" data-price="${item.price}">
              <i class="fas fa-cart-plus"></i> Beli
            </div>
          </div>
        </div>
      </div>
    `).join('');
    
    document.querySelectorAll('.add-to-cart').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        addToCart({ id: btn.dataset.id, name: btn.dataset.name, price: parseInt(btn.dataset.price) });
      });
    });
  }

  function renderCategories() {
    const categories = ["Semua", ...new Set(allItems.map(item => item.category))];
    document.getElementById('filterGroup').innerHTML = categories.map(cat => 
      `<div class="filter-chip ${currentCategory === cat ? 'active' : ''}" data-category="${cat}">${cat}</div>`
    ).join('');
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        currentCategory = chip.dataset.category;
        applyFilters();
      });
    });
  }

  function addToCart(item) {
    const exist = cart.find(i => i.id === item.id);
    if (exist) exist.qty++;
    else cart.push({ ...item, qty: 1 });
    updateCartUI();
    showToast(`✅ ${item.name} ditambahkan`);
  }

  function updateCartUI() {
    const totalItems = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cartCount').innerText = totalItems;
    
    const cartDiv = document.getElementById('cartItems');
    if (cart.length === 0) {
      cartDiv.innerHTML = '<div style="text-align:center;padding:30px;">🛒 Kosong</div>';
      document.getElementById('cartTotal').innerHTML = 'Total: Rp 0';
      return;
    }
    
    cartDiv.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div><strong>${escapeHtml(item.name)}</strong><br>Rp ${item.price.toLocaleString()}</div>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="qty-minus" data-id="${item.id}" style="background:#ef4444;border:none;width:26px;height:26px;border-radius:6px;color:white;cursor:pointer;">-</button>
          <span>${item.qty}</span>
          <button class="qty-plus" data-id="${item.id}" style="background:#22c55e;border:none;width:26px;height:26px;border-radius:6px;color:white;cursor:pointer;">+</button>
          <button class="cart-remove" data-id="${item.id}" style="background:#334155;border:none;width:26px;height:26px;border-radius:6px;color:white;cursor:pointer;"><i class="fas fa-trash"></i></button>
        </div>
      </div>
    `).join('');
    
    const total = cart.reduce((s, i) => s + (i.price * i.qty), 0);
    document.getElementById('cartTotal').innerHTML = `Total: Rp ${total.toLocaleString('id-ID')}`;
    
    document.querySelectorAll('.qty-plus').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = cart.find(i => i.id === btn.dataset.id);
        if (item) { item.qty++; updateCartUI(); }
      });
    });
    document.querySelectorAll('.qty-minus').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = cart.findIndex(i => i.id === btn.dataset.id);
        if (idx !== -1) {
          if (cart[idx].qty > 1) cart[idx].qty--;
          else cart.splice(idx, 1);
          updateCartUI();
        }
      });
    });
    document.querySelectorAll('.cart-remove').forEach(btn => {
      btn.addEventListener('click', () => {
        cart = cart.filter(i => i.id !== btn.dataset.id);
        updateCartUI();
        showToast("🗑 Dihapus");
      });
    });
  }

  function showToast(msg) {
    let t = document.querySelector('.toast');
    if (t) t.remove();
    t = document.createElement('div');
    t.className = 'toast';
    t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2000);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  // Event Listeners
  document.getElementById('search').addEventListener('input', () => applyFilters());
  document.getElementById('refreshBtn').addEventListener('click', () => { loadItems(); showToast("🔄 Data dimuat ulang"); });
  document.getElementById('logoHome').addEventListener('click', () => {
    currentCategory = "Semua";
    document.getElementById('search').value = '';
    applyFilters();
    showToast("🏠 Beranda");
  });
  
  const modal = document.getElementById('cartModal');
  document.getElementById('cartBtn').addEventListener('click', () => { updateCartUI(); modal.classList.add('active'); });
  document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
  document.getElementById('checkoutBtn').addEventListener('click', () => {
    if (cart.length === 0) showToast("Keranjang kosong!");
    else { showToast(`🎉 Checkout sukses! Terima kasih`); cart = []; updateCartUI(); modal.classList.remove('active'); }
  });
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });

  loadItems();
</script>
</body>
</html>
