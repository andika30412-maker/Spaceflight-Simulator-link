<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS SHARE ULTRA</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1e293b;
  animation:slideDown .4s ease;
}
@keyframes slideDown{
  from{transform:translateY(-100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}

/* SEARCH */
#search{
  width:90%;
  margin:10px;
  padding:12px;
  border:none;
  border-radius:10px;
}

/* CARD */
.card{
  background:linear-gradient(135deg,#065f46,#064e3b);
  margin:10px;
  padding:12px;
  border-radius:14px;
  animation:fadeIn .4s ease;
  position:relative;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.card img{
  width:100%;
  border-radius:10px;
  transition:.3s;
}
.card img:hover{transform:scale(1.05)}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition:.2s;
}
button:hover{transform:scale(1.05)}
.open{background:#22c55e}

/* FLOAT +1 */
.float{
  position:absolute;
  color:#22c55e;
  font-weight:bold;
  animation:floatUp 1s forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-120px) scale(1.5)}
}

/* FLOAT BUTTON */
#addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:65px;
  height:65px;
  border-radius:50%;
  background:#22c55e;
  font-size:32px;
  border:none;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.1)}
  100%{transform:scale(1)}
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}
.box{
  background:#020617;
  padding:15px;
  border-radius:14px;
  width:90%;
  animation:pop .3s ease;
}
@keyframes pop{
  from{transform:scale(0.7);opacity:0}
  to{transform:scale(1);opacity:1}
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<header>
  <div onclick="openMenu()">⋮</div>
  <div>🚀 SFS SHARE ULTRA</div>
  <div onclick="openAdd()">＋</div>
</header>

<input id="search" placeholder="Cari rocket / tank / pesawat...">

<div id="list"></div>

<button id="addBtn" onclick="openAdd()">+</button>

<!-- ADD -->
<div class="modal" id="addModal">
  <div class="box">

    <h3>Tambah Item</h3>

    <input id="user" placeholder="Nama pembuat">
    <input id="name" placeholder="Nama roket">
    <input id="link" placeholder="Link">

    <select id="cat">
      <option>Rocket</option>
      <option>Tank</option>
      <option>Pesawat</option>
    </select>

    <input type="file" id="img" accept="image/*">

    <button class="open" onclick="addData()">SIMPAN</button>
    <button onclick="closeAdd()">TUTUP</button>

  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>ADMIN PANEL</h3>
    <div id="adminList"></div>
    <button onclick="closeAdmin()">TUTUP</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};
let cooldown = {};

/* REALTIME */
db.on("value", snap=>{
  data = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  let arr = Object.entries(data);

  list.innerHTML = arr.map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div>by ${r.user} | ${r.cat}</div>

      <button class="open" onclick="openRocket('${k}','${r.link}',event)">
        BUKA
      </button>
    </div>
  `).join("");
}

/* OPEN + LIKE + FLOAT + ANTI SPAM */
function openRocket(id,link,e){

  if(cooldown[id] && Date.now()-cooldown[id]<2000){
    alert("Tunggu sebentar!");
    return;
  }
  cooldown[id]=Date.now();

  let item=data[id];

  db.child(id).update({
    like:(item.like||0)+1
  });

  window.open(link,"_blank");

  let el=document.createElement("div");
  el.className="float";
  el.innerText="+1";
  el.style.left=e.clientX+"px";
  el.style.top=e.clientY+"px";

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

/* ADD FIX TOTAL */
function addData(){

  let file=document.getElementById("img").files[0];
  let user=document.getElementById("user").value;
  let name=document.getElementById("name").value;
  let link=document.getElementById("link").value;
  let cat=document.getElementById("cat").value;

  if(!file){
    alert("Wajib dari galeri!");
    return;
  }

  if(!name.trim()){
    alert("Nama wajib!");
    return;
  }

  let reader=new FileReader();

  reader.onload=function(){
    db.push({
      user:user||"user",
      name:name,
      link:link||"#",
      cat:cat,
      img:reader.result,
      like:0
    });

    closeAdd();

    user.value="";
    name.value="";
    link.value="";
    document.getElementById("img").value="";
  };

  reader.readAsDataURL(file);
}

/* ADMIN MENU */
function openMenu(){
  let pw=prompt("Password Admin:");
  if(pw==="1113292627"){
    adminModal.style.display="flex";
    loadAdmin();
  }else{
    alert("Salah password!");
  }
}

function loadAdmin(){
  adminList.innerHTML=Object.entries(data).map(([k,r])=>`
    <div class="card">
      <h3>${r.name}</h3>
      <button onclick="db.child('${k}').remove()">HAPUS</button>
    </div>
  `).join("");
}

/* MODAL */
function openAdd(){addModal.style.display="flex";}
function closeAdd(){addModal.style.display="none";}
function closeAdmin(){adminModal.style.display="none";}

/* SEARCH */
search.oninput=function(){
  let v=this.value.toLowerCase();
  list.innerHTML=Object.entries(data)
    .filter(([k,r])=>r.name.toLowerCase().includes(v)||r.cat.toLowerCase().includes(v))
    .map(([k,r])=>`
      <div class="card">
        <img src="${r.img}">
        <h3>${r.name}</h3>
        <div>by ${r.user} | ${r.cat}</div>
        <button class="open" onclick="openRocket('${k}','${r.link}',event)">BUKA</button>
      </div>
    `).join("");
};

</script>

</body>
</html>
