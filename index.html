<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS SHARE PRO FIX</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  padding:12px;
  background:#1e293b;
  text-align:center;
  font-weight:bold;
}

/* SEARCH */
#search{
  width:90%;
  margin:10px;
  padding:12px;
  border-radius:10px;
  border:none;
}

/* CARD */
.card{
  background:#065f46;
  margin:10px;
  padding:12px;
  border-radius:12px;
  position:relative;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.open{background:#22c55e;color:white}

/* FLOAT +1 */
.float{
  position:absolute;
  color:#22c55e;
  font-weight:bold;
  animation:up 1s forwards;
}

@keyframes up{
  0%{opacity:1;transform:translateY(0)}
  100%{opacity:0;transform:translateY(-80px)}
}

/* ADD BUTTON */
#addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  background:#22c55e;
  color:black;
  border:none;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  width:90%;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<header>🚀 SFS SHARE PRO FIX</header>

<input id="search" placeholder="Cari roket / tank / pesawat...">

<div id="list"></div>

<!-- FLOAT + BUTTON -->
<button id="addBtn" onclick="openAdd()">+</button>

<!-- ADD MODAL -->
<div class="modal" id="addModal">
  <div class="box">

    <h3>Tambah Item</h3>

    <input id="user" placeholder="Nama pembuat">
    <input id="name" placeholder="Nama roket">
    <input id="link" placeholder="Link">

    <select id="category">
      <option>Rocket</option>
      <option>Tank</option>
      <option>Pesawat</option>
    </select>

    <input type="file" id="img">

    <button class="open" onclick="addRocket()">SIMPAN</button>
    <button onclick="closeAdd()">TUTUP</button>

  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};
let cooldown = {};

/* REALTIME */
db.on("value", snap=>{
  data = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  let arr = Object.entries(data);

  list.innerHTML = arr.map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div>by ${r.user} | ${r.cat}</div>

      <button class="open" onclick="openRocket('${k}','${r.link}',event)">
        BUKA
      </button>
    </div>
  `).join("");
}

/* OPEN + LIKE + FLOAT + ANTI SPAM */
function openRocket(id,link,e){

  if(cooldown[id] && Date.now()-cooldown[id] < 2000){
    alert("Tunggu sebentar!");
    return;
  }
  cooldown[id]=Date.now();

  let item = data[id];

  db.child(id).update({
    like:(item.like||0)+1
  });

  window.open(link,"_blank");

  let el=document.createElement("div");
  el.className="float";
  el.innerText="+1";
  el.style.left=e.clientX+"px";
  el.style.top=e.clientY+"px";

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

/* FIX ADD (NO BUG KONFIRMASI) */
function addRocket(){

  let file = document.getElementById("img").files[0];
  let user = document.getElementById("user");
  let name = document.getElementById("name");
  let link = document.getElementById("link");
  let category = document.getElementById("category");

  if(!file){
    alert("Foto wajib!");
    return;
  }

  if(!name.value.trim()){
    alert("Nama wajib!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(){

    db.push({
      user:user.value.trim() || "user",
      name:name.value.trim(),
      link:link.value.trim() || "#",
      cat:category.value,
      img:reader.result,
      like:0
    });

    user.value="";
    name.value="";
    link.value="";
    document.getElementById("img").value="";

    closeAdd();
  };

  reader.readAsDataURL(file);
}

/* MODAL */
function openAdd(){
  document.getElementById("addModal").style.display="flex";
}

function closeAdd(){
  document.getElementById("addModal").style.display="none";
}

/* SEARCH */
search.oninput=function(){
  let v=this.value.toLowerCase();

  let filtered=Object.fromEntries(
    Object.entries(data).filter(([k,r])=>
      r.name.toLowerCase().includes(v) ||
      r.cat.toLowerCase().includes(v)
    )
  );

  list.innerHTML=Object.entries(filtered).map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div>by ${r.user} | ${r.cat}</div>

      <button class="open" onclick="openRocket('${k}','${r.link}',event)">
        BUKA
      </button>
    </div>
  `).join("");
};

</script>

</body>
</html>
