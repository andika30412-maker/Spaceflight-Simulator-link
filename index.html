<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS SHARE PRO ADMIN</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#1e293b;
}

/* CARD */
.card{
  background:#065f46;
  margin:10px;
  padding:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.open{background:#22c55e}
.delete{background:#ef4444}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  width:90%;
}

/* FLOAT BUTTON */
#addBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#22c55e;
  font-size:30px;
  border:none;
}
</style>
</head>

<body>

<header>
  <div onclick="openMenu()">⋮</div>
  <div>🚀 SFS SHARE</div>
  <div onclick="openAdd()">＋</div>
</header>

<div id="list"></div>

<button id="addBtn" onclick="openAdd()">+</button>

<!-- ADD -->
<div class="modal" id="addModal">
  <div class="box">

    <h3>Tambah Roket</h3>

    <input id="user" placeholder="Nama user (TETAP)">
    <input id="name" placeholder="Nama roket">
    <input id="link" placeholder="Link SFS">

    <select id="cat">
      <option>Rocket</option>
      <option>Tank</option>
      <option>Ship</option>
    </select>

    <!-- GALERI ONLY -->
    <input type="file" id="img" accept="image/*">

    <button class="open" onclick="addData()">Simpan</button>
    <button onclick="closeAdd()">Tutup</button>

  </div>
</div>

<!-- ADMIN -->
<div class="modal" id="adminModal">
  <div class="box">
    <h3>ADMIN PANEL</h3>
    <div id="adminList"></div>
    <button onclick="closeAdmin()">Tutup</button>
  </div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};

/* REALTIME */
db.on("value", snap=>{
  data = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  let arr = Object.entries(data);

  list.innerHTML = arr.map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>

      <!-- USER TIDAK DIUBAH (FIX BUG) -->
      <div>by ${r.user}</div>

      <div>${r.cat}</div>

      <button class="open" onclick="openLink('${k}','${r.link}')">
        BUKA
      </button>
    </div>
  `).join("");
}

/* OPEN LINK */
function openLink(id,link){

  let item = data[id];

  // +1 LIKE SAFE
  db.child(id).update({
    like:(item.like||0)+1
  });

  window.open(link,"_blank");
}

/* FIX ADD (NO BUG + GALERI ONLY) */
function addData(){

  let file = document.getElementById("img").files[0];
  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let link = document.getElementById("link").value;
  let cat = document.getElementById("cat").value;

  // VALIDASI FIX
  if(!file){
    alert("Harus pilih gambar dari galeri!");
    return;
  }

  if(!name.trim()){
    alert("Nama roket wajib!");
    return;
  }

  let reader = new FileReader();

  reader.onload = function(){

    db.push({
      user:user || "user",
      name:name,
      link:link || "#",
      cat:cat,
      img:reader.result,
      like:0
    });

    closeAdd();

    // reset
    document.getElementById("user").value="";
    document.getElementById("name").value="";
    document.getElementById("link").value="";
    document.getElementById("img").value="";
  };

  reader.readAsDataURL(file);
}

/* MENU ADMIN */
function openMenu(){
  let pw = prompt("Password Admin:");

  if(pw === "1113292627"){
    adminModal.style.display="flex";
    loadAdmin();
  } else {
    alert("Password salah!");
  }
}

/* LOAD ADMIN */
function loadAdmin(){
  let arr = Object.entries(data);

  adminList.innerHTML = arr.map(([k,r])=>`
    <div class="card">
      <h3>${r.name}</h3>
      <button class="delete" onclick="db.child('${k}').remove()">HAPUS</button>
    </div>
  `).join("");
}

/* MODAL */
function openAdd(){addModal.style.display="flex";}
function closeAdd(){addModal.style.display="none";}
function closeAdmin(){adminModal.style.display="none";}

</script>

</body>
</html>
