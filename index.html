<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SFS MXZP — Space Blueprint Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root {
  --void: #030508;
  --surface: #0a1220;
  --surface2: #0e1a2e;
  --border: rgba(0,200,255,0.1);
  --border2: rgba(0,200,255,0.22);
  --cyan: #00c8ff;
  --amber: #ffb340;
  --text: #e2eaf8;
  --text2: #6b82a8;
  --danger: #ff4560;
  --radius: 16px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 70px;
}
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* MAINTENANCE OVERLAY */
.maintenance-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0a0a2a, #020210);
  z-index: 10000; display: none; flex-direction: column;
  align-items: center; justify-content: center; backdrop-filter: blur(20px);
}
.maintenance-overlay.active { display: flex; }
.maintenance-icon { font-size: 80px; animation: spinPulse 2s ease infinite; }
@keyframes spinPulse { 0%,100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(180deg); } }
.maintenance-text { font-family: 'Bebas Neue', sans-serif; font-size: 48px; background: linear-gradient(135deg, #00c8ff, #ffb340); -webkit-background-clip: text; background-clip: text; color: transparent; }
.maintenance-timer { font-family: monospace; font-size: 56px; color: var(--cyan); margin: 20px 0; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px; background: rgba(3,5,8,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--cyan), var(--amber)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-logo h2 { font-family: var(--font-display); font-size: 20px; letter-spacing: 3px; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-right { display: flex; align-items: center; gap: 8px; }
.hdr-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--cyan), var(--amber)); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; background-size: cover; background-position: center; }
.hdr-name { font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; }
.logout-btn, .theme-toggle { padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text2); cursor: pointer; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; padding: 6px 12px;
  background: rgba(6,11,20,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border2); border-radius: 40px;
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 16px; border-radius: 30px; cursor: pointer;
  color: var(--text2); font-size: 10px;
}
.nav-item i { font-size: 16px; margin-bottom: 2px; }
.nav-item.active { color: var(--cyan); background: rgba(0,200,255,0.1); }

/* PAGE */
.page { display: none; padding: 16px; }
.page.active { display: block; }
.max-w { max-width: 1000px; margin: 0 auto; }

/* SEARCH */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 30px; padding: 10px 16px; margin-bottom: 16px;
}
.search-bar i { color: var(--cyan); }
.search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text); }

/* CHIPS */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer;
}
.chip.active { background: rgba(0,200,255,0.2); border-color: var(--cyan); color: var(--cyan); }

/* GRID 3 KOLOM */
.bp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

/* CARD */
.bp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}
.bp-card:hover { transform: translateY(-3px); border-color: var(--cyan); }
.bp-thumb {
  width: 100%; aspect-ratio: 1/1;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  overflow: hidden;
}
.bp-thumb img { width: 100%; height: 100%; object-fit: cover; }
.bp-body { padding: 8px; }
.bp-user-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.mini-av {
  width: 24px; height: 24px; border-radius: 6px;
  background: linear-gradient(135deg, var(--cyan), var(--amber));
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: bold; background-size: cover;
}
.bp-username { font-size: 10px; font-weight: 600; color: var(--amber); cursor: pointer; }
.bp-title { font-size: 12px; font-weight: 600; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-stats { display: flex; gap: 8px; font-size: 9px; color: var(--text2); margin: 4px 0; }
.bp-actions { display: flex; gap: 4px; margin-top: 6px; }
.btn-dl { flex: 1; padding: 4px; border-radius: 20px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; font-size: 9px; font-weight: bold; color: #000; cursor: pointer; }
.btn-view { padding: 4px 8px; border-radius: 20px; background: rgba(0,200,255,0.1); border: 1px solid var(--border); font-size: 9px; color: var(--text2); cursor: pointer; }
.bookmark-btn {
  position: absolute; top: 5px; right: 5px;
  width: 24px; height: 24px; border-radius: 6px;
  background: rgba(0,0,0,0.5); border: none;
  color: white; cursor: pointer; font-size: 10px;
}
.bookmark-btn.saved { color: gold; }

/* PROFILE */
.profile-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}
.profile-av {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--amber));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: bold;
  margin: 0 auto 12px;
  background-size: cover; background-position: center;
  position: relative;
  cursor: pointer;
}
.av-cam {
  position: absolute; bottom: 0; right: 0;
  background: var(--cyan); border-radius: 50%;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer;
}
.profile-name { font-size: 20px; font-weight: bold; }
.profile-handle { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.profile-bio { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.profile-stats {
  display: flex; justify-content: center; gap: 24px;
  background: var(--surface2); border-radius: 40px;
  padding: 10px; margin-bottom: 16px;
}
.profile-stat { text-align: center; cursor: pointer; }
.profile-stat-value { font-size: 18px; font-weight: bold; color: var(--cyan); }
.profile-stat-label { font-size: 9px; color: var(--text2); }
.follow-btn, .edit-btn {
  padding: 8px 24px; border-radius: 30px;
  background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6));
  border: none; font-weight: bold; cursor: pointer;
}
.edit-btn { background: rgba(0,200,255,0.2); border: 1px solid var(--border); }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; width: 90%; max-width: 450px;
  padding: 20px; max-height: 80vh; overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: bold; color: var(--cyan); margin-bottom: 16px; display: flex; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.modal-inp { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 10px; }
.modal-btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn-primary { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
.modal-btn-secondary { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 30px; color: var(--text2); cursor: pointer; }

.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--cyan); color: #000; padding: 8px 20px;
  border-radius: 30px; font-size: 12px; font-weight: bold;
  z-index: 400; animation: fadeUp 0.2s;
}
@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
#fab { position: fixed; bottom: 80px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; font-size: 24px; color: #000; cursor: pointer; z-index: 90; }
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- MAINTENANCE OVERLAY -->
<div id="maintenanceOverlay" class="maintenance-overlay">
  <div class="maintenance-icon">🪬</div>
  <div class="maintenance-text">MAINTENANCE MODE</div>
  <div class="maintenance-timer" id="maintenanceTimer">20:00</div>
</div>

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-wrap" style="background: var(--surface); border-radius: 24px; padding: 32px; width: 90%; max-width: 400px;">
    <div class="auth-logo" style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 48px;">🚀</div>
      <h1 style="font-family: var(--font-display); font-size: 28px;">SFS MXZP</h1>
    </div>
    <div class="tab-switcher" style="display: flex; gap: 8px; margin-bottom: 20px;">
      <button class="tab-btn" style="flex:1; padding: 8px; background: var(--surface2); border: none; border-radius: 30px; cursor: pointer;" onclick="switchTab('login')">LOGIN</button>
      <button class="tab-btn" style="flex:1; padding: 8px; background: var(--surface2); border: none; border-radius: 30px; cursor: pointer;" onclick="switchTab('register')">DAFTAR</button>
    </div>
    <div id="loginForm">
      <input type="text" id="loginUser" placeholder="Username" style="width:100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); margin-bottom: 12px;">
      <input type="password" id="loginPass" placeholder="Password" style="width:100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); margin-bottom: 12px;">
      <button class="auth-btn" style="width:100%; padding: 12px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: 30px; font-weight: bold;" onclick="doLogin()">MASUK</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUser" placeholder="Username (min 3)" style="width:100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px;">
      <input type="password" id="regPass" placeholder="Password (min 6)" style="width:100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px;">
      <input type="password" id="regConfirm" placeholder="Konfirmasi" style="width:100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px;">
      <button class="auth-btn" style="width:100%; padding: 12px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: 30px; font-weight: bold;" onclick="doRegister()">DAFTAR</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div class="header-logo" onclick="goPage('home')"><div class="logo-mark">🚀</div><h2>SFS MXZP</h2></div>
    <div class="header-right">
      <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>
      <div class="hdr-avatar" id="hdrAv" onclick="goProfile(null)"></div>
      <span class="hdr-name" id="hdrName" onclick="goProfile(null)"></span>
      <button class="logout-btn" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </div>

  <div class="page active" id="homePage">
    <div class="max-w">
      <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="homeSearch" placeholder="Cari blueprint..." oninput="renderHome()"></div>
      <div class="chips" id="chipGroup"></div>
      <div id="homeGrid" class="bp-grid"></div>
    </div>
  </div>

  <div class="page" id="savedPage">
    <div class="max-w"><div class="section-title" style="font-family: monospace; margin-bottom: 16px;">📌 TERSIMPAN</div><div id="savedGrid" class="bp-grid"></div></div>
  </div>

  <div class="page" id="profilePage"><div class="max-w" id="profileContent"></div></div>

  <div class="page" id="adminPage"><div class="max-w" id="adminContent"></div></div>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="goPage('home')"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-item" onclick="goPage('saved')"><i class="fas fa-bookmark"></i><span>Simpan</span></div>
    <div class="nav-item" id="navAdmin" style="display:none;" onclick="goPage('admin')"><i class="fas fa-crown"></i><span>Admin</span></div>
    <div class="nav-item" onclick="goProfile(null)"><i class="fas fa-user"></i><span>Profil</span></div>
  </nav>

  <button id="fab" onclick="openShareModal()">+</button>
</div>

<!-- MODALS -->
<div class="modal-bg" id="shareModal"><div class="modal-box"><div class="modal-title"><span>Share Blueprint</span><button class="modal-close" onclick="closeM('shareModal')">✕</button></div><input class="modal-inp" id="sName" placeholder="Nama Blueprint"><textarea class="modal-inp" id="sDesc" rows="2" placeholder="Deskripsi"></textarea><input class="modal-inp" id="sLink" placeholder="Link Download"><select class="modal-inp" id="sCat"><option>🚀 Rocket</option><option>✈️ Pesawat</option><option>🛰️ Satelit</option><option>🛸 UFO</option></select><input type="file" id="sImg" accept="image/*" onchange="previewShare()"><img id="sPreview" style="width:100%; margin-top:8px; border-radius:10px; display:none;"><div class="modal-btn-row"><button class="modal-btn-primary" onclick="doShare()">SHARE</button><button class="modal-btn-secondary" onclick="closeM('shareModal')">Batal</button></div></div></div>

<div class="modal-bg" id="detailModal"><div class="modal-box" id="detailContent"></div></div>
<div class="modal-bg" id="followModal"><div class="modal-box"><div class="modal-title"><span id="followModalTitle">Followers</span><button class="modal-close" onclick="closeM('followModal')">✕</button></div><div id="followModalList"></div></div></div>
<div class="modal-bg" id="editProfileModal"><div class="modal-box"><div class="modal-title"><span>Edit Profil</span><button class="modal-close" onclick="closeM('editProfileModal')">✕</button></div><input class="modal-inp" id="epName" placeholder="Display Name"><textarea class="modal-inp" id="epBio" rows="2" placeholder="Bio"></textarea><input type="file" id="epImg" accept="image/*" onchange="previewEpImg()"><img id="epPreview" style="width:100%; margin-top:8px; border-radius:10px; display:none;"><div class="modal-btn-row"><button class="modal-btn-primary" onclick="saveProfile()">SIMPAN</button><button class="modal-btn-secondary" onclick="closeM('editProfileModal')">Batal</button></div></div></div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDrKldhzV7uVqpjTztcb_ok3-rW0xwirlI",
  authDomain: "sfs-void.firebaseapp.com",
  databaseURL: "https://sfs-void-default-rtdb.firebaseio.com",
  projectId: "sfs-void"
};
firebase.initializeApp(firebaseConfig);
const bpRef = firebase.database().ref("blueprints");
const usrRef = firebase.database().ref("users");
const bookmarkRef = firebase.database().ref("bookmarks");

// SPECIAL ACCOUNTS
const SPECIAL = {
  GALACTIC_BOSS: { pw: "nasi_goreng_4ever", role: "admin" },
  SPACE_NERD: { pw: "kopi_dulu_bro_2024", role: "dev" }
};

let ME = null;
let allBP = {};
let allUsers = {};
let currentFilter = "Semua";
let currentPage = "home";
let profileTarget = null;
let myBookmarks = [];

// ============ MAINTENANCE CHECK ============
function checkMaintenance() {
  fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json")
    .then(res => res.json())
    .then(data => {
      if (data && data.active) {
        document.getElementById('maintenanceOverlay').classList.add('active');
        let timeLeft = 20 * 60;
        let interval = setInterval(() => {
          timeLeft--;
          let m = Math.floor(timeLeft / 60);
          let s = timeLeft % 60;
          document.getElementById('maintenanceTimer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
          if (timeLeft <= 0) { clearInterval(interval); location.reload(); }
        }, 1000);
      }
    }).catch(() => {});
}
setInterval(checkMaintenance, 5000);
checkMaintenance();

// CANVAS STARS
(function(){
  const cv = document.getElementById('bgCanvas'), ctx = cv.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  for(let i=0;i<150;i++) stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, a: Math.random(), da: (Math.random()-0.5)*0.005 });
  function loop(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => { s.a = Math.max(0.05, Math.min(1, s.a + s.da)); if(s.a<=0.05||s.a>=1) s.da*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

function fmt(n){ if(n>=1e9) return (n/1e9).toFixed(1)+'M'; if(n>=1e6) return (n/1e6).toFixed(1)+'JT'; if(n>=1e3) return (n/1e3).toFixed(1)+'RB'; return String(n); }
function esc(s){ if(!s) return ''; return String(s).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toast(msg){ let t=document.createElement('div'); t.className='toast'; t.innerText=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function closeM(id){ document.getElementById(id).classList.remove('open'); }
function openM(id){ document.getElementById(id).classList.add('open'); }
function toggleTheme(){ document.body.classList.toggle('light-mode'); }

function setAvatar(elId, username){
  let el = document.getElementById(elId);
  if(!el) return;
  let ud = allUsers[username] || {};
  if(ud.photoURL){ el.style.backgroundImage = `url(${ud.photoURL})`; el.style.backgroundSize = 'cover'; el.innerText = ''; }
  else { el.style.backgroundImage = ''; el.innerText = (ud.displayName || username).charAt(0).toUpperCase(); }
}

function avatarEl(username, size=24){
  let ud = allUsers[username] || {};
  let init = (ud.displayName || username).charAt(0).toUpperCase();
  if(ud.photoURL) return `<div class="mini-av" style="width:${size}px;height:${size}px;background-image:url(${ud.photoURL});background-size:cover;"></div>`;
  return `<div class="mini-av" style="width:${size}px;height:${size}px;">${init}</div>`;
}

// AUTH
function switchTab(t){
  document.getElementById('loginForm').style.display = t === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = t === 'register' ? 'block' : 'none';
}
async function doLogin(){
  let u = document.getElementById('loginUser').value.trim();
  let p = document.getElementById('loginPass').value;
  if(!u || !p){ toast("Isi semua kolom"); return; }
  if(SPECIAL[u]){
    if(SPECIAL[u].pw === p) finalLogin(u);
    else toast("Password salah");
    return;
  }
  let snap = await usrRef.child(u).once('value');
  if(!snap.exists()){ toast("User tidak ditemukan"); return; }
  if(snap.val().password !== p){ toast("Password salah"); return; }
  finalLogin(u);
}
async function doRegister(){
  let u = document.getElementById('regUser').value.trim();
  let p = document.getElementById('regPass').value;
  let c = document.getElementById('regConfirm').value;
  if(u.length < 3){ toast("Username min 3 karakter"); return; }
  if(SPECIAL[u]){ toast("Username tidak tersedia"); return; }
  if(p.length < 6){ toast("Password min 6 karakter"); return; }
  if(p !== c){ toast("Password tidak cocok"); return; }
  let ex = await usrRef.child(u).once('value');
  if(ex.exists()){ toast("Username sudah dipakai"); return; }
  await usrRef.child(u).set({
    username: u, password: p, role: 'user', displayName: u, bio: '',
    photoURL: null, createdAt: Date.now(), followers: {}, following: {}, blueprintCount: 0
  });
  toast("Daftar berhasil! Silakan login");
  switchTab('login');
}
function finalLogin(u){
  ME = u;
  localStorage.setItem('sfs_me', u);
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  document.getElementById('hdrName').innerText = u;
  document.getElementById('navAdmin').style.display = (u === 'GALACTIC_BOSS' || u === 'SPACE_NERD') ? 'flex' : 'none';
  loadData();
  setAvatar('hdrAv', u);
  goPage('home');
  toast(`Selamat datang, ${u}!`);
}
function doLogout(){
  localStorage.removeItem('sfs_me');
  ME = null;
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display = 'none';
}
function checkSession(){ let s = localStorage.getItem('sfs_me'); if(s) finalLogin(s); }

function loadData(){
  bpRef.on('value', async snap => {
    allBP = snap.val() || {};
    await loadBookmarks();
    if(currentPage === 'home') renderHome();
    if(currentPage === 'profile') renderProfile(profileTarget);
    if(currentPage === 'saved') renderSaved();
  });
  usrRef.on('value', snap => {
    allUsers = snap.val() || {};
    if(currentPage === 'admin' && (ME === 'GALACTIC_BOSS' || ME === 'SPACE_NERD')) renderAdmin();
    if(currentPage === 'profile') renderProfile(profileTarget);
    setAvatar('hdrAv', ME);
  });
}

function goPage(p){
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  currentPage = p;
  document.getElementById(p + 'Page').classList.add('active');
  if(p === 'home') renderHome();
  if(p === 'saved') renderSaved();
  if(p === 'admin' && (ME === 'GALACTIC_BOSS' || ME === 'SPACE_NERD')) renderAdmin();
}
function goProfile(username){
  profileTarget = username || ME;
  currentPage = 'profile';
  document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
  document.getElementById('profilePage').classList.add('active');
  renderProfile(profileTarget);
}

// HOME
const CATS = ["Semua", "🚀 Rocket", "✈️ Pesawat", "🛰️ Satelit", "🛸 UFO"];
function renderHome(){
  let chips = document.getElementById('chipGroup');
  chips.innerHTML = CATS.map(c => `<div class="chip ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>`).join('');
  let term = document.getElementById('homeSearch')?.value.toLowerCase() || '';
  let entries = Object.entries(allBP).filter(([k,i]) => !i.banned);
  if(currentFilter !== 'Semua') entries = entries.filter(([k,i]) => i.cat === currentFilter);
  if(term) entries = entries.filter(([k,i]) => (i.name || '').toLowerCase().includes(term) || (i.user || '').toLowerCase().includes(term));
  entries.sort((a,b) => (b[1].created || 0) - (a[1].created || 0));
  let grid = document.getElementById('homeGrid');
  if(!entries.length){ grid.innerHTML = '<div class="empty">🔭 Belum ada blueprint</div>'; return; }
  grid.innerHTML = entries.map(([id,item]) => bpCard(id,item)).join('');
}
function setFilter(c){ currentFilter = c; renderHome(); }
function bpCard(id,item){
  let liked = item.likes && item.likes[ME];
  return `<div class="bp-card">
    <div class="bp-thumb">${item.img ? `<img src="${item.img}" onclick="openDetail('${id}')">` : `<div onclick="openDetail('${id}')">🚀</div>`}</div>
    <div class="bp-body">
      <div class="bp-user-row">${avatarEl(item.user)}<span class="bp-username" onclick="goProfile('${esc(item.user)}')">${esc(item.user)}</span></div>
      <div class="bp-title" onclick="openDetail('${id}')">${esc(item.name)}</div>
      <div class="bp-stats"><span class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${id}')"><i class="${liked ? 'fas' : 'far'} fa-heart"></i> ${fmt(Object.keys(item.likes || {}).length)}</span><span><i class="far fa-eye"></i> ${fmt(item.views || 0)}</span></div>
      <div class="bp-actions"><button class="btn-dl" onclick="window.open('${esc(item.link)}','_blank')">DL</button><button class="btn-view" onclick="openDetail('${id}')">Lihat</button></div>
    </div>
    <button class="bookmark-btn ${isBookmarked(id) ? 'saved' : ''}" onclick="toggleBookmark('${id}')"><i class="fas fa-bookmark"></i></button>
  </div>`;
}
async function toggleLike(id){
  let item = allBP[id]; if(!item) return;
  let likes = { ...item.likes || {} };
  if(likes[ME]) delete likes[ME];
  else likes[ME] = true;
  await bpRef.child(id).update({ likes });
  if(currentPage === 'home') renderHome();
  else if(currentPage === 'saved') renderSaved();
}
async function openDetail(id){
  let item = allBP[id]; if(!item) return;
  await bpRef.child(id).update({ views: (item.views || 0) + 1 });
  item = allBP[id] || item;
  let liked = item.likes && item.likes[ME];
  let comments = item.comments || [];
  let imgBlock = item.img ? `<img src="${item.img}" style="width:100%; border-radius:12px; margin-bottom:12px;">` : '';
  document.getElementById('detailContent').innerHTML = `
    <div class="modal-title">${esc(item.name)}<button class="modal-close" onclick="closeM('detailModal')">✕</button></div>
    ${imgBlock}
    <div class="bp-user-row" onclick="goProfile('${esc(item.user)}')">${avatarEl(item.user,36)}<div><strong>${esc(item.user)}</strong><div style="font-size:10px;">${esc(item.cat)}</div></div></div>
    <div class="detail-desc">${item.desc ? esc(item.desc) : ''}</div>
    <div class="bp-stats"><span class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike('${id}');openDetail('${id}')"><i class="${liked ? 'fas' : 'far'} fa-heart"></i> ${fmt(Object.keys(item.likes || {}).length)}</span><span><i class="far fa-eye"></i> ${fmt(item.views || 0)}</span></div>
    <button class="btn-dl" style="width:100%; margin-bottom:12px;" onclick="window.open('${esc(item.link)}','_blank')">Download Blueprint</button>
    <div class="section-title">Komentar</div>
    <div style="display:flex; gap:8px;"><input class="modal-inp" id="cmtInput" placeholder="Tulis komentar..." style="margin:0; flex:1;"><button class="btn-dl" onclick="addComment('${id}')">Kirim</button></div>
    <div id="cmtList">${comments.slice().reverse().map(c => `<div style="background:rgba(0,0,0,0.3); padding:8px; border-radius:10px; margin-top:8px;"><div class="comment-user" style="cursor:pointer; font-weight:bold; color:var(--amber);" onclick="goProfile('${esc(c.user)}')">${esc(c.user)}</div><div>${esc(c.text)}</div></div>`).join('')}</div>
    <button class="btn-dl" style="width:100%; margin-top:12px; background:#ef4444;" onclick="deleteBP('${id}')">Hapus Blueprint</button>
  `;
  openM('detailModal');
}
async function addComment(id){
  let txt = document.getElementById('cmtInput')?.value.trim();
  if(!txt) return;
  let item = allBP[id];
  let comments = [...(item.comments || []), { user: ME, text: txt, time: Date.now() }];
  await bpRef.child(id).update({ comments });
  openDetail(id);
}
function deleteBP(id){ if(confirm('Hapus blueprint ini?')){ bpRef.child(id).remove(); closeM('detailModal'); toast('Blueprint dihapus'); } }

// BOOKMARK
async function loadBookmarks(){ if(!ME) return; let s = await bookmarkRef.child(ME).once('value'); myBookmarks = s.val() ? Object.keys(s.val()) : []; }
async function toggleBookmark(id){
  if(!ME) return;
  let s = await bookmarkRef.child(ME).child(id).once('value');
  if(s.exists()){ await bookmarkRef.child(ME).child(id).remove(); myBookmarks = myBookmarks.filter(b => b !== id); toast('Dihapus dari simpanan'); }
  else { await bookmarkRef.child(ME).child(id).set(true); myBookmarks.push(id); toast('Tersimpan!'); }
  if(currentPage === 'saved') renderSaved(); else renderHome();
}
function isBookmarked(id){ return myBookmarks.includes(id); }
async function renderSaved(){
  let saved = Object.entries(allBP).filter(([id]) => myBookmarks.includes(id) && !allBP[id]?.banned);
  let grid = document.getElementById('savedGrid');
  if(!saved.length){ grid.innerHTML = '<div class="empty">📌 Belum ada blueprint tersimpan</div>'; return; }
  grid.innerHTML = saved.map(([id,item]) => bpCard(id,item)).join('');
}

// SHARE
function openShareModal(){ document.getElementById('sName').value = ''; document.getElementById('sDesc').value = ''; document.getElementById('sLink').value = ''; document.getElementById('sImg').value = ''; document.getElementById('sPreview').style.display = 'none'; openM('shareModal'); }
function previewShare(){ let f = document.getElementById('sImg').files[0]; if(f){ let r = new FileReader(); r.onload = e => { document.getElementById('sPreview').src = e.target.result; document.getElementById('sPreview').style.display = 'block'; }; r.readAsDataURL(f); } }
function doShare(){
  let name = document.getElementById('sName').value.trim();
  let link = document.getElementById('sLink').value.trim();
  if(!name){ toast('Nama wajib diisi'); return; }
  let file = document.getElementById('sImg').files[0];
  if(!file){ toast('Upload gambar'); return; }
  let reader = new FileReader();
  reader.onload = () => {
    bpRef.push({ user: ME, name: name, desc: document.getElementById('sDesc').value.trim(), link: link || '#', cat: document.getElementById('sCat').value, img: reader.result, views: 0, likes: {}, comments: [], created: Date.now() });
    closeM('shareModal');
    toast('Blueprint dishare! 🚀');
  };
  reader.readAsDataURL(file);
}

// PROFILE
async function renderProfile(username){
  let ud = allUsers[username] || {};
  let isSpecial = SPECIAL[username];
  let displayName = isSpecial ? (username === 'GALACTIC_BOSS' ? '🌌 GALACTIC BOSS' : '🧠 SPACE NERD') : (ud.displayName || username);
  let myBP = Object.entries(allBP).filter(([k,i]) => i.user === username && !i.banned);
  let totalViews = myBP.reduce((s,[k,i]) => s + (i.views || 0), 0);
  let totalLikes = myBP.reduce((s,[k,i]) => s + Object.keys(i.likes || {}).length, 0);
  let followers = Object.keys(ud.followers || {}).length;
  let following = Object.keys(ud.following || {}).length;
  let isOwn = ME === username;
  let photo = ud.photoURL;
  let avStyle = photo ? `background-image:url(${photo});background-size:cover;` : 'background:linear-gradient(135deg, var(--cyan), var(--amber));';
  
  document.getElementById('profileContent').innerHTML = `
    <div class="profile-hero">
      <div class="profile-av" style="${avStyle}" onclick="${isOwn ? "document.getElementById('avatarInput').click();" : ""}">${!photo ? displayName.charAt(0).toUpperCase() : ''}${isOwn ? '<div class="av-cam"><i class="fas fa-camera"></i></div>' : ''}</div>
      <div class="profile-name">${esc(displayName)}</div>
      <div class="profile-handle">@${esc(username)}</div>
      ${ud.bio ? `<div class="profile-bio">${esc(ud.bio)}</div>` : ''}
      <div class="profile-stats">
        <div class="profile-stat" onclick="showFollowList('${username}','followers')"><div class="profile-stat-value">${fmt(followers)}</div><div class="profile-stat-label">Followers</div></div>
        <div class="profile-stat" onclick="showFollowList('${username}','following')"><div class="profile-stat-value">${fmt(following)}</div><div class="profile-stat-label">Following</div></div>
        <div class="profile-stat"><div class="profile-stat-value">${myBP.length}</div><div class="profile-stat-label">BP</div></div>
        <div class="profile-stat"><div class="profile-stat-value">${fmt(totalViews)}</div><div class="profile-stat-label">Views</div></div>
        <div class="profile-stat"><div class="profile-stat-value">${fmt(totalLikes)}</div><div class="profile-stat-label">Likes</div></div>
      </div>
      ${isOwn ? `<button class="edit-btn" onclick="openEditProfile()"><i class="fas fa-user-edit"></i> Edit Profil</button>` : `<button class="follow-btn" onclick="toggleFollow('${username}')">${ud.followers && ud.followers[ME] ? 'Unfollow' : 'Follow'}</button>`}
      ${isOwn ? `<input type="file" id="avatarInput" accept="image/*" style="display:none;" onchange="uploadAvatar()">` : ''}
    </div>
    <div class="bp-grid">${myBP.length ? myBP.map(([id,item]) => bpCard(id,item)).join('') : '<div class="empty">🛸 Belum ada blueprint</div>'}</div>
  `;
}
async function toggleFollow(target){
  if(target === ME) return;
  let td = (await usrRef.child(target).once('value')).val() || {};
  let md = (await usrRef.child(ME).once('value')).val() || {};
  let tf = { ...td.followers || {} };
  let mf = { ...md.following || {} };
  if(tf[ME]){ delete tf[ME]; delete mf[target]; toast(`Berhenti follow ${target}`); }
  else { tf[ME] = true; mf[target] = true; toast(`Follow ${target}`); }
  await usrRef.child(target).update({ followers: tf });
  await usrRef.child(ME).update({ following: mf });
  renderProfile(target);
}
async function showFollowList(username, type){
  let ud = (await usrRef.child(username).once('value')).val() || {};
  let list = Object.keys(type === 'followers' ? (ud.followers || {}) : (ud.following || {}));
  document.getElementById('followModalTitle').innerText = `${type === 'followers' ? 'Followers' : 'Following'} @${username}`;
  let cont = document.getElementById('followModalList');
  if(!list.length){ cont.innerHTML = '<div style="text-align:center;padding:24px;">Tidak ada</div>'; openM('followModal'); return; }
  cont.innerHTML = list.map(u => `<div class="follow-list-item" onclick="closeM('followModal');goProfile('${esc(u)}')" style="display:flex; align-items:center; gap:10px; padding:8px; cursor:pointer;">${avatarEl(u,36)}<div><strong>${esc(allUsers[u]?.displayName || u)}</strong><div style="font-size:10px;">@${esc(u)}</div></div></div>`).join('');
  openM('followModal');
}
function openEditProfile(){
  let ud = allUsers[ME] || {};
  document.getElementById('epName').value = ud.displayName || ME;
  document.getElementById('epBio').value = ud.bio || '';
  openM('editProfileModal');
}
function previewEpImg(){ let f = document.getElementById('epImg').files[0]; if(f){ let r = new FileReader(); r.onload = e => { document.getElementById('epPreview').src = e.target.result; document.getElementById('epPreview').style.display = 'block'; }; r.readAsDataURL(f); } }
async function saveProfile(){
  let name = document.getElementById('epName').value.trim() || ME;
  let bio = document.getElementById('epBio').value.trim();
  let file = document.getElementById('epImg').files[0];
  let updates = { displayName: name, bio: bio };
  if(file){
    let r = new FileReader();
    r.onload = async () => { updates.photoURL = r.result; await usrRef.child(ME).update(updates); closeM('editProfileModal'); setAvatar('hdrAv', ME); renderProfile(ME); toast('Profil diupdate'); };
    r.readAsDataURL(file);
    return;
  }
  await usrRef.child(ME).update(updates);
  closeM('editProfileModal');
  setAvatar('hdrAv', ME);
  renderProfile(ME);
  toast('Profil diupdate');
}
async function uploadAvatar(){
  let file = document.getElementById('avatarInput').files[0];
  if(!file) return;
  let r = new FileReader();
  r.onload = async () => { await usrRef.child(ME).update({ photoURL: r.result }); setAvatar('hdrAv', ME); renderProfile(ME); toast('Foto diupdate'); };
  r.readAsDataURL(file);
}

// ADMIN
function renderAdmin(){
  if(ME !== 'GALACTIC_BOSS' && ME !== 'SPACE_NERD'){ document.getElementById('adminContent').innerHTML = '<div class="empty">🔒 Akses ditolak</div>'; return; }
  let totalBP = Object.keys(allBP).length;
  let totalUsers = Object.keys(allUsers).length;
  document.getElementById('adminContent').innerHTML = `
    <div class="admin-header" style="background: var(--surface); border-radius: 20px; padding: 16px; margin-bottom: 16px;">
      <div class="section-title">🛸 ADMIN PANEL</div>
      <div class="admin-stats" style="display: flex; gap: 16px; margin-bottom: 16px;"><div class="admin-stat" style="background: var(--surface2); padding: 12px; border-radius: 12px;">📦 Total BP: ${totalBP}</div><div class="admin-stat" style="background: var(--surface2); padding: 12px; border-radius: 12px;">👥 Total User: ${totalUsers}</div></div>
      <button class="adm-btn" style="padding: 8px 16px; background: var(--cyan-dim); border: none; border-radius: 30px; cursor: pointer;" onclick="startMaintenance()">🔧 MAINTENANCE MODE (20 Menit)</button>
    </div>
    <div class="section-title">👤 User Management</div>
    ${Object.entries(allUsers).map(([u,d]) => `<div class="admin-item" style="background: var(--surface); border-radius: 12px; padding: 12px; margin-bottom: 8px;"><div><strong>${esc(u)}</strong> - ${fmt(Object.keys(d.followers || {}).length)} followers</div><button class="adm-btn" style="margin-top: 8px; padding: 4px 12px; background: rgba(0,200,255,0.2); border: none; border-radius: 20px; cursor: pointer;" onclick="adminAddFollowers('${u}')">+Followers</button><button class="adm-btn" style="margin-left: 8px; padding: 4px 12px; background: rgba(239,68,68,0.2); border: none; border-radius: 20px; cursor: pointer;" onclick="adminDeleteUser('${u}')">Hapus User</button></div>`).join('')}
  `;
}
function startMaintenance(){
  if(confirm('⚠️ Maintenance mode akan mengunci website selama 20 menit?')){
    fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json", { method: "PUT", body: JSON.stringify({ active: true, started: Date.now() }) });
    toast('Maintenance mode diaktifkan!');
    setTimeout(() => location.reload(), 1000);
  }
}
function adminAddFollowers(u){
  let num = prompt(`Tambah followers untuk @${u} (max 999jt):`, "100");
  if(num){
    num = Math.abs(parseInt(num)) || 100;
    if(num > 999999999) num = 999999999;
    usrRef.child(u).once('value', snap => {
      let ud = snap.val() || {};
      let fol = { ...ud.followers || {} };
      for(let i = 0; i < num; i++) fol[`bot_${Date.now()}_${i}`] = true;
      usrRef.child(u).update({ followers: fol });
      toast(`+${fmt(num)} followers ke ${u}`);
    });
  }
}
function adminDeleteUser(u){
  if(confirm(`Hapus user @${u} beserta semua blueprint-nya?`)){
    usrRef.child(u).remove();
    Object.entries(allBP).forEach(([id,item]) => { if(item.user === u) bpRef.child(id).remove(); });
    toast(`User ${u} dihapus`);
  }
}

// INIT
checkSession();
</script>
</body>
</html>
