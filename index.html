<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SFS MXZP — Space Blueprint Hub</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
/* (sama seperti style sebelumnya, tidak diubah) */
:root {
  --void: #030508;
  --surface: #0a1220;
  --surface2: #0e1a2e;
  --border: rgba(0,200,255,0.1);
  --border2: rgba(0,200,255,0.22);
  --cyan: #00c8ff;
  --amber: #ffb340;
  --text: #e2eaf8;
  --text2: #6b82a8;
  --danger: #ff4560;
  --radius: 16px;
  --font-display: 'Bebas Neue', sans-serif;
  --font-body: 'Space Grotesk', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--font-body);
  background: var(--void);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 70px;
}
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* MAINTENANCE OVERLAY */
.maintenance-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: radial-gradient(ellipse at center, #0a0a2a, #020210);
  z-index: 10000; display: none; flex-direction: column;
  align-items: center; justify-content: center; backdrop-filter: blur(20px);
}
.maintenance-overlay.active { display: flex; }
.maintenance-icon { font-size: 80px; animation: spinPulse 2s ease infinite; }
@keyframes spinPulse { 0%,100% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.2) rotate(180deg); } }
.maintenance-text { font-family: 'Bebas Neue', sans-serif; font-size: 48px; background: linear-gradient(135deg, #00c8ff, #ffb340); -webkit-background-clip: text; background-clip: text; color: transparent; }
.maintenance-timer { font-family: monospace; font-size: 56px; color: var(--cyan); margin: 20px 0; }

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 20px; background: rgba(3,5,8,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-logo { display: flex; align-items: center; gap: 10px; cursor: pointer; }
.logo-mark { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--cyan), var(--amber)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-logo h2 { font-family: var(--font-display); font-size: 20px; letter-spacing: 3px; background: linear-gradient(135deg, #fff, var(--cyan)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.header-right { display: flex; align-items: center; gap: 8px; }
.hdr-avatar { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--cyan), var(--amber)); display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; background-size: cover; background-position: center; }
.hdr-name { font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; }
.logout-btn, .theme-toggle { padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text2); cursor: pointer; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 4px; padding: 6px 12px;
  background: rgba(6,11,20,0.95); backdrop-filter: blur(20px);
  border: 1px solid var(--border2); border-radius: 40px;
  z-index: 100;
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  padding: 6px 16px; border-radius: 30px; cursor: pointer;
  color: var(--text2); font-size: 10px;
}
.nav-item i { font-size: 16px; margin-bottom: 2px; }
.nav-item.active { color: var(--cyan); background: rgba(0,200,255,0.1); }

/* PAGE */
.page { display: none; padding: 16px; }
.page.active { display: block; }
.max-w { max-width: 1000px; margin: 0 auto; }

/* SEARCH */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 30px; padding: 10px 16px; margin-bottom: 16px;
}
.search-bar i { color: var(--cyan); }
.search-bar input { flex: 1; background: none; border: none; outline: none; color: var(--text); }

/* CHIPS */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.chip {
  padding: 5px 14px; border-radius: 20px; font-size: 11px;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer;
}
.chip.active { background: rgba(0,200,255,0.2); border-color: var(--cyan); color: var(--cyan); }

/* GRID 3 KOLOM */
.bp-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

/* CARD */
.bp-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.2s;
  position: relative;
}
.bp-card:hover { transform: translateY(-3px); border-color: var(--cyan); }
.bp-thumb {
  width: 100%; aspect-ratio: 1/1;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 40px;
  overflow: hidden;
}
.bp-thumb img { width: 100%; height: 100%; object-fit: cover; }
.bp-body { padding: 8px; }
.bp-user-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
.mini-av {
  width: 24px; height: 24px; border-radius: 6px;
  background: linear-gradient(135deg, var(--cyan), var(--amber));
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: bold; background-size: cover;
}
.bp-username { font-size: 10px; font-weight: 600; color: var(--amber); cursor: pointer; }
.bp-title { font-size: 12px; font-weight: 600; margin: 4px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bp-stats { display: flex; gap: 8px; font-size: 9px; color: var(--text2); margin: 4px 0; }
.bp-actions { display: flex; gap: 4px; margin-top: 6px; }
.btn-dl { flex: 1; padding: 4px; border-radius: 20px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; font-size: 9px; font-weight: bold; color: #000; cursor: pointer; }
.btn-view { padding: 4px 8px; border-radius: 20px; background: rgba(0,200,255,0.1); border: 1px solid var(--border); font-size: 9px; color: var(--text2); cursor: pointer; }
.bookmark-btn {
  position: absolute; top: 5px; right: 5px;
  width: 24px; height: 24px; border-radius: 6px;
  background: rgba(0,0,0,0.5); border: none;
  color: white; cursor: pointer; font-size: 10px;
}
.bookmark-btn.saved { color: gold; }

/* PROFILE */
.profile-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 20px;
  text-align: center;
}
.profile-av {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan), var(--amber));
  display: flex; align-items: center; justify-content: center;
  font-size: 32px; font-weight: bold;
  margin: 0 auto 12px;
  background-size: cover; background-position: center;
  position: relative;
  cursor: pointer;
}
.av-cam {
  position: absolute; bottom: 0; right: 0;
  background: var(--cyan); border-radius: 50%;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  font-size: 10px; cursor: pointer;
}
.profile-name { font-size: 20px; font-weight: bold; }
.profile-handle { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.profile-bio { font-size: 12px; color: var(--text2); margin-bottom: 16px; }
.profile-stats {
  display: flex; justify-content: center; gap: 24px;
  background: var(--surface2); border-radius: 40px;
  padding: 10px; margin-bottom: 16px;
}
.profile-stat { text-align: center; cursor: pointer; }
.profile-stat-value { font-size: 18px; font-weight: bold; color: var(--cyan); }
.profile-stat-label { font-size: 9px; color: var(--text2); }
.follow-btn, .edit-btn {
  padding: 8px 24px; border-radius: 30px;
  background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6));
  border: none; font-weight: bold; cursor: pointer;
}
.edit-btn { background: rgba(0,200,255,0.2); border: 1px solid var(--border); }

/* MODAL */
.modal-bg {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.9); backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; width: 90%; max-width: 450px;
  padding: 20px; max-height: 80vh; overflow-y: auto;
}
.modal-title { font-size: 18px; font-weight: bold; color: var(--cyan); margin-bottom: 16px; display: flex; justify-content: space-between; }
.modal-close { background: none; border: none; color: var(--text2); font-size: 20px; cursor: pointer; }
.modal-inp { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); margin-bottom: 10px; }
.modal-btn-row { display: flex; gap: 10px; margin-top: 16px; }
.modal-btn-primary { flex: 1; padding: 10px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: 30px; font-weight: bold; cursor: pointer; }
.modal-btn-secondary { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 30px; color: var(--text2); cursor: pointer; }

.empty { text-align: center; padding: 60px 20px; color: var(--text2); }
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--cyan); color: #000; padding: 8px 20px;
  border-radius: 30px; font-size: 12px; font-weight: bold;
  z-index: 400; animation: fadeUp 0.2s;
}
@keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
#fab { position: fixed; bottom: 80px; right: 16px; width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; font-size: 24px; color: #000; cursor: pointer; z-index: 90; }
</style>
</head>

<canvas id="bgCanvas"></canvas>

<!-- MAINTENANCE OVERLAY -->

<!-- AUTH SCREEN -->
<div id="authScreen">
  <div class="auth-wrap" style="background: var(--surface); border-radius: 24px; padding: 32px; width: 90%; max-width: 400px;">

      <button class="auth-btn" style="width:100%; padding: 12px; background: linear-gradient(135deg, var(--cyan), rgba(0,200,255,0.6)); border: none; border-radius: 30px; font-weight: bold;" onclick="doRegister()">DAFTAR</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" style="display:none;">
  <div class="header">
    <div class="header-logo" onclick="goPage('home')"><div class="logo-mark">🚀</div><h2>SFS MXZP</h2></div>
    <div class="header-right">
      <div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon"></i></div>

  <div class="page active" id="homePage">

      <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="homeSearch" placeholder="Cari blueprint..." oninput="renderHome()"></div>
      <div class="chips" id="chipGroup"></div>
      <div id="homeGrid" class="bp-grid"></div>

<!-- MODALS (sama seperti sebelumnya) -->
<div class="modal-bg" id="shareModal"><div class="modal-box"><div class="modal-title"><span>Share Blueprint</span><button class="modal-close" onclick="closeM('shareModal')">✕</button></div><input class="modal-inp" id="sName" placeholder="Nama Blueprint"><textarea class="modal-inp" id="sDesc" rows="2" placeholder="Deskripsi"></textarea><input class="modal-inp" id="sLink" placeholder="Link Download"><select class="modal-inp" id="sCat"><option>🚀 Rocket</option><option>✈️ Pesawat</option><option>🛰️ Satelit</option><option>🛸 UFO</option></select><input type="file" id="sImg" accept="image/*" onchange="previewShare()"><img id="sPreview" style="width:100%; margin-top:8px; border-radius:10px; display:none;"><div class="modal-btn-row"><button class="modal-btn-primary" onclick="doShare()">SHARE</button><button class="modal-btn-secondary" onclick="closeM('shareModal')">Batal</button></div></div></div>

<div class="modal-bg" id="detailModal"><div class="modal-box" id="detailContent"></div></div>

<script>
// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDrKldhzV7uVqpjTztcb_ok3-rW0xwirlI",
  authDomain: "sfs-void.firebaseapp.com",
  databaseURL: "https://sfs-void-default-rtdb.firebaseio.com",
  projectId: "sfs-void"
};
firebase.initializeApp(firebaseConfig);
const bpRef = firebase.database().ref("blueprints");
const usrRef = firebase.database().ref("users");
const bookmarkRef = firebase.database().ref("bookmarks");

// SPECIAL ACCOUNTS
const SPECIAL = {
  GALACTIC_BOSS: { pw: "nasi_goreng_4ever", role: "admin" },
  SPACE_NERD: { pw: "kopi_dulu_bro_2024", role: "dev" }
};

let ME = null;
let allBP = {};
let allUsers = {};
let currentFilter = "Semua";
let currentPage = "home";
let profileTarget = null;
let myBookmarks = [];

// ============ MAINTENANCE CHECK ============
function checkMaintenance() {
  fetch("https://sfs-void-default-rtdb.firebaseio.com/maintenance.json")
    .then(res => res.json())
    .then(data => {
      if (data && data.active) {
        document.getElementById('maintenanceOverlay').classList.add('active');
        let timeLeft = 20 * 60;
        let interval = setInterval(() => {
          timeLeft--;
          let m = Math.floor(timeLeft / 60);
          let s = timeLeft % 60;
          document.getElementById('maintenanceTimer').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
          if (timeLeft <= 0) { clearInterval(interval); location.reload(); }
        }, 1000);
      }
    }).catch(() => {});
}
setInterval(checkMaintenance, 5000);
checkMaintenance();

// CANVAS STARS
(function(){
  const cv = document.getElementById('bgCanvas'), ctx = cv.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  for(let i=0;i<150;i++) stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, a: Math.random(), da: (Math.random()-0.5)*0.005 });
  function loop(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => { s.a = Math.max(0.05, Math.min(1, s.a + s.da)); if(s.a<=0.05||s.a>=1) s.da*=-1; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle = `rgba(255,255,255,${s.a})`; ctx.fill(); });
    requestAnimationFrame(loop);
  }
  loop();
})();

function fmt(n){ if(n>=1e9) return (n/1e9).toFixed(1)+'M'; if(n>=1e6) return (n/1e6).toFixed(1)+'JT'; if(n>=1e3) return (n/1e3).toFixed(1)+'RB'; return String(n); }
function esc(s){ if(!s) return ''; return String(s).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
function toast(msg){ let t=document.createEleme
