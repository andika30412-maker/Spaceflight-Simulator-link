<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SFS SHARE - Katalog Item</title>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: linear-gradient(90deg, #1e293b 0%, #334155 100%);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #22c55e, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: #22c55e;
      transform: scale(1.1);
    }

    /* SEARCH */
    .search-container {
      padding: 20px;
      background: rgba(0, 0, 0, 0.2);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #search {
      flex: 1;
      min-width: 200px;
      padding: 12px 16px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(30, 41, 59, 0.8);
      color: white;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    #search:focus {
      outline: none;
      border-color: #22c55e;
      background: rgba(30, 41, 59, 1);
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
    }

    .filter-btn {
      padding: 10px 16px;
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid #22c55e;
      border-radius: 8px;
      color: #22c55e;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 13px;
      font-weight: 500;
    }

    .filter-btn:hover, .filter-btn.active {
      background: #22c55e;
      color: white;
    }

    /* GRID */
    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* CARD */
    .card {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      animation: slideIn 0.4s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      border-color: #22c55e;
      box-shadow: 0 8px 25px rgba(34, 197, 94, 0.2);
      transform: translateY(-5px);
    }

    .card-image {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: linear-gradient(135deg, #334155, #1e293b);
    }

    .card-content {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #f1f5f9;
      line-height: 1.4;
    }

    .card-meta {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 12px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(34, 197, 94, 0.15);
      color: #22c55e;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .card-buttons {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-open {
      background: linear-gradient(135deg, #22c55e, #10b981);
      color: white;
    }

    .btn-open:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
      border: 1px solid #ef4444;
    }

    .btn-delete:hover {
      background: #ef4444;
      color: white;
    }

    /* FLOAT BUTTON */
    #addBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #22c55e, #10b981);
      border: none;
      color: white;
      font-size: 32px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(34, 197, 94, 0.4);
      transition: all 0.3s ease;
      z-index: 90;
    }

    #addBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(34, 197, 94, 0.6);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid rgba(34, 197, 94, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        transform: translateY(-50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .modal-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #f1f5f9;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: #cbd5e1;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input[type="text"],
    input[type="password"],
    input[type="file"],
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      background: rgba(30, 41, 59, 0.8);
      color: white;
      font-family: inherit;
      font-size: 14px;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus,
    input[type="password"]:focus,
    input[type="file"]:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: #22c55e;
      background: rgba(30, 41, 59, 1);
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.2);
    }

    select {
      cursor: pointer;
    }

    input[type="file"] {
      padding: 8px;
    }

    .preview-image {
      width: 100%;
      margin-top: 10px;
      border-radius: 8px;
      max-height: 200px;
      object-fit: cover;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #22c55e, #10b981);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary:hover {
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
      transform: translateY(-2px);
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* EMPTY STATE */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #94a3b8;
    }

    .empty-state-icon {
      font-size: 60px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      #list {
        grid-template-columns: 1fr;
        gap: 16px;
        padding: 16px;
      }

      .search-container {
        padding: 16px;
        gap: 8px;
      }

      #search {
        min-width: unset;
      }

      .modal-box {
        width: 95%;
        padding: 20px;
      }

      header {
        padding: 12px 16px;
      }

      .logo {
        font-size: 20px;
      }
    }

    /* LOADING */
    .loading {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">📦 SFS SHARE</div>
  <div class="header-actions">
    <button class="icon-btn" onclick="openAdmin()" title="Admin Panel">⚙️</button>
    <button class="icon-btn" onclick="openAdd()" title="Tambah Item">➕</button>
  </div>
</header>

<div class="search-container">
  <input 
    id="search" 
    type="text" 
    placeholder="Cari item, kategori, atau user..." 
    onkeyup="filterItems()"
  >
</div>

<div id="list"></div>

<button id="addBtn" onclick="openAdd()" title="Tambah Item">+</button>

<!-- MODAL TAMBAH -->
<div class="modal" id="addModal">
  <div class="modal-box">
    <h2 class="modal-title">➕ Tambah Item Baru</h2>

    <div class="form-group">
      <label>Nama User</label>
      <input id="user" type="text" placeholder="Masukkan nama user...">
    </div>

    <div class="form-group">
      <label>Nama Item</label>
      <input id="name" type="text" placeholder="Masukkan nama item...">
    </div>

    <div class="form-group">
      <label>Link / URL</label>
      <input id="link" type="text" placeholder="https://example.com">
    </div>

    <div class="form-group">
      <label>Kategori</label>
      <select id="cat">
        <option>Rocket</option>
        <option>Tank</option>
        <option>Pesawat</option>
        <option>Satellite</option>
        <option>Kapal Bawah Laut</option>
      </select>
    </div>

    <div class="form-group">
      <label>Gambar</label>
      <input id="img" type="file" accept="image/*" onchange="previewImage()">
      <img id="preview" class="preview-image" style="display:none;">
    </div>

    <div class="modal-buttons">
      <button class="btn-primary" onclick="addData()">💾 SIMPAN</button>
      <button class="btn-secondary" onclick="closeAdd()">✕ TUTUP</button>
    </div>
  </div>
</div>

<!-- MODAL LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-box" style="max-width: 350px;">
    <h2 class="modal-title">🔐 Admin Login</h2>

    <div class="form-group">
      <label>Password Admin</label>
      <input id="pass" type="password" placeholder="Masukkan password..." onkeypress="if(event.key==='Enter') login()">
    </div>

    <div class="modal-buttons">
      <button class="btn-primary" onclick="login()">LOGIN</button>
      <button class="btn-secondary" onclick="closeLogin()">BATAL</button>
    </div>
  </div>
</div>

<!-- MODAL ADMIN -->
<div class="modal" id="adminModal">
  <div class="modal-box">
    <h2 class="modal-title">⚙️ Admin Panel</h2>
    <div id="adminList" style="max-height: 70vh; overflow-y: auto;"></div>
    <div class="modal-buttons" style="margin-top: 20px;">
      <button class="btn-secondary" onclick="closeAdmin()">TUTUP</button>
    </div>
  </div>
</div>

<script>

/* ===== FIREBASE CONFIG ===== */
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};
let filteredData = {};

/* ===== DATABASE ===== */
db.on("value", (snap) => {
  data = snap.val() || {};
  filteredData = data;
  render();
});

/* ===== RENDER ITEMS ===== */
function render() {
  const listDiv = document.getElementById("list");
  
  if (Object.keys(filteredData).length === 0) {
    listDiv.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state-icon">📭</div>
        <h3>Tidak Ada Item</h3>
        <p>Mulai dengan menambahkan item baru</p>
      </div>
    `;
    return;
  }

  listDiv.innerHTML = Object.entries(filteredData)
    .map(([k, r]) => `
      <div class="card">
        <img src="${r.img || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'}" alt="${r.name}" class="card-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22%3E%3Crect fill=%22%23334155%22 width=%22100%22 height=%22100%22/%3E%3C/svg%3E'">
        <div class="card-content">
          <h3 class="card-title">${r.name || 'Item Tanpa Nama'}</h3>
          <div class="card-meta">
            <span>👤 ${r.user || 'Anonymous'}</span>
            <span class="badge">${r.cat || 'Uncategorized'}</span>
          </div>
          <div class="card-buttons">
            <button class="btn btn-open" onclick="window.open('${r.link || '#'}', '_blank')">
              🔗 BUKA
            </button>
          </div>
        </div>
      </div>
    `)
    .join("");
}

/* ===== FILTER ITEMS ===== */
function filterItems() {
  const searchTerm = document.getElementById("search").value.toLowerCase();
  
  if (!searchTerm) {
    filteredData = data;
  } else {
    filteredData = Object.fromEntries(
      Object.entries(data).filter(([k, r]) => 
        (r.name || '').toLowerCase().includes(searchTerm) ||
        (r.user || '').toLowerCase().includes(searchTerm) ||
        (r.cat || '').toLowerCase().includes(searchTerm)
      )
    );
  }
  
  render();
}

/* ===== PREVIEW IMAGE ===== */
function previewImage() {
  const file = document.getElementById("img").files[0];
  const preview = document.getElementById("preview");
  
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

/* ===== ADD DATA ===== */
function addData() {
  const file = document.getElementById("img").files[0];
  
  if (!document.getElementById("name").value.trim()) {
    alert("⚠️ Nama item tidak boleh kosong");
    return;
  }
  
  if (!file) {
    alert("⚠️ Gambar harus dipilih");
    return;
  }

  const reader = new FileReader();
  reader.onload = () => {
    db.push({
      user: document.getElementById("user").value.trim() || "User",
      name: document.getElementById("name").value.trim(),
      link: document.getElementById("link").value.trim() || "#",
      cat: document.getElementById("cat").value,
      img: reader.result,
      created: new Date().toISOString()
    });
    
    closeAdd();
    alert("✅ Item berhasil ditambahkan");
  };
  
  reader.readAsDataURL(file);
}

/* ===== ADMIN ===== */
function openAdmin() {
  document.getElementById("loginModal").classList.add("active");
  document.getElementById("pass").focus();
}

function closeLogin() {
  document.getElementById("loginModal").classList.remove("active");
  document.getElementById("pass").value = "";
}

function login() {
  const password = document.getElementById("pass").value;
  const correctPassword = "1113292627";
  
  if (password === correctPassword) {
    document.getElementById("loginModal").classList.remove("active");
    document.getElementById("adminModal").classList.add("active");
    loadAdmin();
  } else {
    alert("❌ Password salah");
    document.getElementById("pass").value = "";
    document.getElementById("pass").focus();
  }
}

/* ===== LOAD ADMIN ===== */
function loadAdmin() {
  const adminDiv = document.getElementById("adminList");
  
  if (Object.keys(data).length === 0) {
    adminDiv.innerHTML = '<p style="text-align:center; color: #94a3b8;">Tidak ada item untuk diedit</p>';
    return;
  }
  
  adminDiv.innerHTML = Object.entries(data)
    .map(([k, r]) => `
      <div class="card" style="margin-bottom: 20px;">
        <img src="${r.img}" class="card-image" style="display:none;">
        
        <div class="form-group">
          <label>Nama Item</label>
          <input id="n${k}" type="text" value="${r.name || ''}">
        </div>

        <div class="form-group">
          <label>Link</label>
          <input id="l${k}" type="text" value="${r.link || ''}">
        </div>

        <div class="form-group">
          <label>Kategori</label>
          <select id="c${k}">
            <option ${r.cat === "Rocket" ? "selected" : ""}>Rocket</option>
            <option ${r.cat === "Tank" ? "selected" : ""}>Tank</option>
            <option ${r.cat === "Pesawat" ? "selected" : ""}>Pesawat</option>
            <option ${r.cat === "Satellite" ? "selected" : ""}>Satellite</option>
            <option ${r.cat === "Kapal Bawah Laut" ? "selected" : ""}>Kapal Bawah Laut</option>
          </select>
        </div>

        <div class="form-group">
          <label>Gambar Baru (Opsional)</label>
          <input id="i${k}" type="file" accept="image/*">
        </div>

        <div class="card-buttons">
          <button class="btn btn-open" onclick="save('${k}')">💾 SIMPAN</button>
          <button class="btn btn-delete" onclick="deleteItem('${k}')">🗑️ HAPUS</button>
        </div>
      </div>
    `)
    .join("");
}

/* ===== SAVE ITEM ===== */
function save(id) {
  const file = document.getElementById("i" + id).files[0];
  
  const updateData = {
    name: document.getElementById("n" + id).value.trim(),
    link: document.getElementById("l" + id).value.trim(),
    cat: document.getElementById("c" + id).value
  };

  if (file) {
    const reader = new FileReader();
    reader.onload = () => {
      updateData.img = reader.result;
      db.child(id).update(updateData);
      alert("✅ Item berhasil diperbarui");
    };
    reader.readAsDataURL(file);
  } else {
    db.child(id).update(updateData);
    alert("✅ Item berhasil diperbarui");
  }
}

/* ===== DELETE ITEM ===== */
function deleteItem(id) {
  if (confirm("⚠️ Yakin ingin menghapus item ini?")) {
    db.child(id).remove();
    loadAdmin();
    alert("✅ Item berhasil dihapus");
  }
}

/* ===== MODAL CONTROLS ===== */
function openAdd() {
  document.getElementById("addModal").classList.add("active");
  document.getElementById("user").focus();
}

function closeAdd() {
  document.getElementById("addModal").classList.remove("active");
  document.getElementById("user").value = "";
  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
  document.getElementById("cat").value = "Rocket";
  document.getElementById("img").value = "";
  document.getElementById("preview").style.display = "none";
}

function closeAdmin() {
  document.getElementById("adminModal").classList.remove("active");
}

/* ===== CLOSE MODAL ON OUTSIDE CLICK ===== */
document.querySelectorAll(".modal").forEach(modal => {
  modal.addEventListener("click", (e) => {
    if (e.target === modal) {
      modal.classList.remove("active");
      if (modal.id === "addModal") closeAdd();
      if (modal.id === "loginModal") closeLogin();
    }
  });
});

</script>

</body>
</html>
