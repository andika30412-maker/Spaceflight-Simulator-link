<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFS Android Share</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* simple android style */
header{
  padding:12px;
  background:#1e293b;
  text-align:center;
  font-weight:bold;
}

.container{padding:12px}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

.card{
  background:#065f46;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
}

.card img{
  width:100%;
  border-radius:10px;
}

button{
  width:100%;
  padding:12px;
  margin-top:6px;
  border:none;
  border-radius:8px;
  font-size:16px;
  cursor:pointer;
}

.open{
  background:#22c55e;
}

/* modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  background:#020617;
  padding:15px;
  border-radius:12px;
  width:95%;
}
</style>
</head>

<body>

<header>🚀 SFS SHARE ANDROID</header>

<div class="container">
  <input id="search" placeholder="Cari...">
  <div id="list"></div>
</div>

<!-- ADD -->
<div class="modal" id="addModal">
  <div class="box">
    <h3>Tambah</h3>

    <input id="user" placeholder="User">
    <input id="name" placeholder="Nama roket">
    <input id="link" placeholder="Link">
    
    <select id="category">
      <option>Rocket</option>
      <option>Tank</option>
      <option>Ship</option>
    </select>

    <input type="file" id="img">

    <button onclick="addRocket()" class="open">Simpan</button>
    <button onclick="closeAdd()">Tutup</button>
  </div>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");

let data = {};

/* REALTIME */
db.on("value", snap=>{
  data = snap.val() || {};
  render();
});

/* RENDER */
function render(){
  let arr = Object.entries(data);

  document.getElementById("list").innerHTML =
  arr.map(([k,r])=>`
    <div class="card">
      <img src="${r.img}">
      <h3>${r.name}</h3>
      <div>by ${r.user} | ${r.cat}</div>

      <!-- TOMBOL BUKA = AUTO LIKE +1 -->
      <button class="open" onclick="openRocket('${k}','${r.link}')">
        BUKA
      </button>

      <div>❤️ ${r.like||0}</div>
    </div>
  `).join("");
}

/* BUKA = LIKE +1 */
function openRocket(id,link){
  let item = data[id];

  db.child(id).update({
    like:(item.like||0)+1
  });

  window.open(link,"_blank");
}

/* ADD */
function addRocket(){
  let file = img.files[0];
  if(!file) return alert("Foto wajib!");
  if(!name.value.trim()) return alert("Nama wajib!");

  let reader = new FileReader();

  reader.onload = function(){
    db.push({
      user:user.value||"user",
      name:name.value.trim(),
      link:link.value||"#",
      cat:category.value,
      img:reader.result,
      like:0
    });

    closeAdd();
  };

  reader.readAsDataURL(file);
}

/* MODAL */
function closeAdd(){
  addModal.style.display="none";
}

</script>

</body>
</html>
