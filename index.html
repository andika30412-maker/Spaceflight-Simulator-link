<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SFS SHARE - Share Blueprint Spaceflight Simulator</title>
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(ellipse at bottom, #0a0f2a 0%, #050810 100%);
      color: #e2e8f0;
      min-height: 100vh;
    }

    /* Bintang berkedip */
    .stars {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: transparent;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: rgba(5, 15, 25, 0.95);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 2px solid #ff6b35;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 36px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }

    .logo-text {
      font-size: 22px;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b35, #ffb347);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-sub {
      font-size: 10px;
      color: #ffb347;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      gap: 12px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.4);
      color: #ff6b35;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .icon-btn:hover {
      background: #ff6b35;
      color: #0a0f2a;
      transform: scale(1.05);
    }

    /* SEARCH */
    .search-container {
      padding: 20px 24px;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid rgba(255, 107, 53, 0.3);
    }

    .search-wrapper {
      flex: 1;
      min-width: 220px;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #ff6b35;
    }

    #search {
      width: 100%;
      padding: 12px 16px 12px 42px;
      border: 2px solid rgba(255, 107, 53, 0.3);
      border-radius: 30px;
      background: rgba(10, 20, 35, 0.9);
      color: white;
      font-size: 14px;
    }

    #search:focus {
      outline: none;
      border-color: #ff6b35;
    }

    .filter-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 8px 16px;
      background: rgba(255, 107, 53, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 30px;
      color: #ffb347;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .filter-chip:hover, .filter-chip.active {
      background: #ff6b35;
      color: #0a0f2a;
      border-color: transparent;
    }

    /* STATS */
    .stats-bar {
      padding: 10px 24px;
      display: flex;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.3);
      font-size: 12px;
      color: #ffb347;
    }

    /* GRID */
    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .blueprint-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
    }

    /* CARD Blueprint */
    .bp-card {
      background: linear-gradient(135deg, rgba(15, 25, 45, 0.95), rgba(8, 15, 30, 0.95));
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s;
      border: 1px solid rgba(255, 107, 53, 0.3);
      cursor: pointer;
      backdrop-filter: blur(5px);
    }

    .bp-card:hover {
      transform: translateY(-8px);
      border-color: #ff6b35;
      box-shadow: 0 15px 40px rgba(255, 107, 53, 0.2);
    }

    .bp-image {
      width: 100%;
      height: 170px;
      background: linear-gradient(135deg, #0a1525, #050a15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 60px;
    }

    .bp-image i {
      filter: drop-shadow(0 0 15px rgba(255, 107, 53, 0.5));
      transition: transform 0.3s;
    }

    .bp-card:hover .bp-image i {
      transform: scale(1.1) rotate(5deg);
    }

    .bp-info {
      padding: 16px;
    }

    .bp-name {
      font-size: 17px;
      font-weight: 700;
      color: #ffb347;
      margin-bottom: 5px;
    }

    .bp-user {
      font-size: 11px;
      color: #8ba0b8;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bp-category {
      font-size: 10px;
      background: rgba(255, 107, 53, 0.2);
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
      color: #ffb347;
    }

    .bp-footer {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    .download-btn, .copy-btn {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .download-btn {
      background: linear-gradient(135deg, #ff6b35, #ffb347);
      border: none;
      color: #0a0f2a;
    }

    .download-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(255, 107, 53, 0.5);
    }

    .copy-btn {
      background: rgba(255, 107, 53, 0.15);
      border: 1px solid rgba(255, 107, 53, 0.4);
      color: #ffb347;
    }

    .copy-btn:hover {
      background: rgba(255, 107, 53, 0.3);
    }

    /* FLOAT BUTTON */
    #shareBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b35, #ffb347);
      border: none;
      color: #0a0f2a;
      font-size: 26px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.5);
      z-index: 90;
      transition: all 0.3s;
    }

    #shareBtn:hover {
      transform: scale(1.1) rotate(90deg);
    }

    /* MODAL */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal.active {
      display: flex;
    }

    .modal-box {
      background: linear-gradient(135deg, #0f1929, #0a1020);
      padding: 28px;
      border-radius: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid rgba(255, 107, 53, 0.4);
    }

    .modal-title {
      font-size: 22px;
      font-weight: bold;
      color: #ff6b35;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: #ffb347;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid rgba(255, 107, 53, 0.3);
      border-radius: 12px;
      background: rgba(5, 15, 30, 0.9);
      color: white;
      font-size: 13px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #ff6b35;
    }

    .preview-image {
      width: 100%;
      margin-top: 10px;
      border-radius: 12px;
      max-height: 150px;
      object-fit: cover;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-primary {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #ff6b35, #ffb347);
      border: none;
      border-radius: 12px;
      color: #0a0f2a;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-secondary {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 107, 53, 0.4);
      border-radius: 12px;
      color: #ffb347;
      cursor: pointer;
    }

    .empty-state {
      text-align: center;
      padding: 60px;
      grid-column: 1/-1;
    }

    .empty-state i {
      font-size: 70px;
      color: #ff6b35;
      margin-bottom: 16px;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #ff6b35;
      color: #0a0f2a;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      z-index: 2000;
      animation: fadeInUp 0.3s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @media (max-width: 768px) {
      .container { padding: 16px; }
      .blueprint-grid { gap: 16px; }
      .logo-text { font-size: 18px; }
      .logo-icon { font-size: 28px; }
    }
  </style>
</head>

<body>
<div class="stars" id="stars"></div>

<header>
  <div class="logo">
    <div class="logo-icon">🚀</div>
    <div>
      <div class="logo-text">SFS SHARE</div>
      <div class="logo-sub">Share Blueprint Spaceflight Simulator</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="adminBtn"><i class="fas fa-shield-alt"></i></button>
    <button class="icon-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i></button>
  </div>
</header>

<div class="search-container">
  <div class="search-wrapper">
    <i class="fas fa-search"></i>
    <input type="text" id="search" placeholder="Cari blueprint rocket, pesawat, atau user...">
  </div>
  <div class="filter-group" id="filterGroup"></div>
</div>

<div class="stats-bar">
  <span id="itemCount"><i class="fas fa-rocket"></i> Memuat blueprint...</span>
  <span><i class="fas fa-download"></i> Gratis Download BP</span>
</div>

<div class="container">
  <div class="blueprint-grid" id="blueprintGrid"></div>
</div>

<button id="shareBtn"><i class="fas fa-share-alt"></i></button>

<!-- MODAL SHARE BP -->
<div id="shareModal" class="modal">
  <div class="modal-box">
    <h2 class="modal-title"><i class="fas fa-rocket"></i> Share Blueprint</h2>
    <div class="form-group">
      <label>Nama User</label>
      <input id="user" type="text" placeholder="Username kamu">
    </div>
    <div class="form-group">
      <label>Nama Blueprint</label>
      <input id="name" type="text" placeholder="Contoh: Saturn V, Falcon 9, Lunar Lander">
    </div>
    <div class="form-group">
      <label>Link Download BP</label>
      <input id="link" type="text" placeholder="Google Drive / Mediafire / Pastebin">
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="cat">
        <option>🚀 Rocket</option>
        <option>✈️ Pesawat</option>
        <option>🛰️ Satelit</option>
        <option>🛸 UFO</option>
        <option>🏭 Space Station</option>
        <option>🌙 Lunar Lander</option>
      </select>
    </div>
    <div class="form-group">
      <label>Gambar Preview</label>
      <input id="img" type="file" accept="image/*" onchange="previewImage()">
      <img id="preview" class="preview-image" style="display:none;">
    </div>
    <div class="modal-buttons">
      <button class="btn-primary" onclick="shareBlueprint()">🚀 SHARE</button>
      <button class="btn-secondary" onclick="closeShare()">BATAL</button>
    </div>
  </div>
</div>

<!-- MODAL LOGIN ADMIN -->
<div id="loginModal" class="modal">
  <div class="modal-box" style="max-width: 350px;">
    <h2 class="modal-title"><i class="fas fa-lock"></i> Admin Login</h2>
    <div class="form-group">
      <label>Password</label>
      <input id="pass" type="password" placeholder="Masukkan password" onkeypress="if(event.key==='Enter') login()">
    </div>
    <div class="modal-buttons">
      <button class="btn-primary" onclick="login()">LOGIN</button>
      <button class="btn-secondary" onclick="closeLogin()">BATAL</button>
    </div>
  </div>
</div>

<!-- MODAL ADMIN PANEL -->
<div id="adminModal" class="modal">
  <div class="modal-box">
    <h2 class="modal-title"><i class="fas fa-edit"></i> Admin Panel</h2>
    <div id="adminList" style="max-height: 60vh; overflow-y: auto;"></div>
    <div class="modal-buttons">
      <button class="btn-secondary" onclick="closeAdmin()">TUTUP</button>
    </div>
  </div>
</div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("blueprints");

let allBlueprints = {};
let filteredBlueprints = {};
let currentFilter = "Semua";

// Generate bintang
function generateStars() {
  const starsDiv = document.getElementById('stars');
  for (let i = 0; i < 200; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.width = Math.random() * 3 + 1 + 'px';
    star.style.height = star.style.width;
    star.style.animationDelay = Math.random() * 5 + 's';
    star.style.animationDuration = Math.random() * 3 + 2 + 's';
    starsDiv.appendChild(star);
  }
}
generateStars();

// Load data
db.on("value", (snap) => {
  allBlueprints = snap.val() || {};
  applyFilters();
});

function applyFilters() {
  const searchTerm = document.getElementById("search").value.toLowerCase();
  
  let filtered = Object.fromEntries(
    Object.entries(allBlueprints).filter(([key, item]) => {
      const matchSearch = !searchTerm || 
        (item.name || '').toLowerCase().includes(searchTerm) ||
        (item.user || '').toLowerCase().includes(searchTerm) ||
        (item.cat || '').toLowerCase().includes(searchTerm);
      
      const matchCat = currentFilter === "Semua" || (item.cat || '').includes(currentFilter);
      
      return matchSearch && matchCat;
    })
  );
  
  filteredBlueprints = filtered;
  document.getElementById("itemCount").innerHTML = `<i class="fas fa-rocket"></i> ${Object.keys(filteredBlueprints).length} Blueprint`;
  renderBlueprints();
  renderFilters();
}

function getIconByCategory(cat) {
  if (cat.includes('Rocket')) return 'fas fa-rocket';
  if (cat.includes('Pesawat')) return 'fas fa-fighter-jet';
  if (cat.includes('Satelit')) return 'fas fa-satellite';
  if (cat.includes('UFO')) return 'fas fa-meteor';
  if (cat.includes('Space Station')) return 'fas fa-space-station-moon';
  if (cat.includes('Lunar')) return 'fas fa-moon';
  return 'fas fa-space-shuttle';
}

function renderBlueprints() {
  const grid = document.getElementById("blueprintGrid");
  
  if (Object.keys(filteredBlueprints).length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-rocket"></i>
        <h3>Belum Ada Blueprint</h3>
        <p>Jadi yang pertama share blueprint SFS-mu!</p>
        <button class="download-btn" onclick="openShare()" style="margin-top:16px;">📤 Share Blueprint</button>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = Object.entries(filteredBlueprints).map(([key, item]) => `
    <div class="bp-card">
      <div class="bp-image">
        <i class="${getIconByCategory(item.cat)}"></i>
      </div>
      <div class="bp-info">
        <div class="bp-name">${escapeHtml(item.name || 'No Name')}</div>
        <div class="bp-user"><i class="fas fa-user-astronaut"></i> ${escapeHtml(item.user || 'Anonymous')}</div>
        <div class="bp-category">${item.cat || 'Rocket'}</div>
        <div class="bp-footer">
          <button class="download-btn" onclick="window.open('${item.link || '#'}', '_blank')">
            <i class="fas fa-download"></i> Download BP
          </button>
          <button class="copy-btn" onclick="copyLink('${item.link || '#'}')">
            <i class="fas fa-copy"></i> Copy
          </button>
        </div>
      </div>
    </div>
  `).join('');
}

function copyLink(link) {
  navigator.clipboard.writeText(link);
  showToast("✅ Link BP berhasil disalin!");
}

function showToast(msg) {
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.innerHTML = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2000);
}

function renderFilters() {
  const categories = ["Semua", "🚀 Rocket", "✈️ Pesawat", "🛰️ Satelit", "🛸 UFO", "🏭 Space Station", "🌙 Lunar Lander"];
  const filterDiv = document.getElementById("filterGroup");
  
  filterDiv.innerHTML = categories.map(cat => `
    <div class="filter-chip ${currentFilter === cat ? 'active' : ''}" data-cat="${cat}">${cat}</div>
  `).join('');
  
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      currentFilter = chip.dataset.cat;
      applyFilters();
    });
  });
}

function previewImage() {
  const file = document.getElementById("img").files[0];
  const preview = document.getElementById("preview");
  if (file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      preview.src = e.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
}

function shareBlueprint() {
  const file = document.getElementById("img").files[0];
  const name = document.getElementById("name").value.trim();
  
  if (!name) {
    alert("⚠️ Nama blueprint harus diisi!");
    return;
  }
  
  if (!file) {
    alert("⚠️ Upload gambar preview blueprint!");
    return;
  }
  
  const reader = new FileReader();
  reader.onload = () => {
    db.push({
      user: document.getElementById("user").value.trim() || "SFS Player",
      name: name,
      link: document.getElementById("link").value.trim() || "#",
      cat: document.getElementById("cat").value,
      img: reader.result,
      created: new Date().toISOString()
    });
    closeShare();
    showToast("✅ Blueprint berhasil dishare! 🚀");
  };
  reader.readAsDataURL(file);
}

// Admin
function openAdmin() {
  document.getElementById("loginModal").classList.add("active");
}

function closeLogin() {
  document.getElementById("loginModal").classList.remove("active");
  document.getElementById("pass").value = "";
}

function login() {
  const password = document.getElementById("pass").value;
  if (password === "1113292627") {
    document.getElementById("loginModal").classList.remove("active");
    document.getElementById("adminModal").classList.add("active");
    loadAdminList();
  } else {
    alert("❌ Password salah!");
  }
}

function loadAdminList() {
  const adminDiv = document.getElementById("adminList");
  if (Object.keys(allBlueprints).length === 0) {
    adminDiv.innerHTML = '<p style="text-align:center;">Tidak ada blueprint</p>';
    return;
  }
  
  adminDiv.innerHTML = Object.entries(allBlueprints).map(([key, item]) => `
    <div style="background:rgba(255,107,53,0.1); border-radius:16px; padding:12px; margin-bottom:12px;">
      <div><strong>${escapeHtml(item.name)}</strong> by ${escapeHtml(item.user)}</div>
      <div class="form-group" style="margin-top:10px;">
        <input id="edit_name_${key}" value="${escapeHtml(item.name)}" placeholder="Nama">
      </div>
      <div class="form-group">
        <input id="edit_link_${key}" value="${escapeHtml(item.link)}" placeholder="Link BP">
      </div>
      <div class="form-group">
        <select id="edit_cat_${key}">
          <option ${item.cat === '🚀 Rocket' ? 'selected' : ''}>🚀 Rocket</option>
          <option ${item.cat === '✈️ Pesawat' ? 'selected' : ''}>✈️ Pesawat</option>
          <option ${item.cat === '🛰️ Satelit' ? 'selected' : ''}>🛰️ Satelit</option>
          <option ${item.cat === '🛸 UFO' ? 'selected' : ''}>🛸 UFO</option>
          <option ${item.cat === '🏭 Space Station' ? 'selected' : ''}>🏭 Space Station</option>
          <option ${item.cat === '🌙 Lunar Lander' ? 'selected' : ''}>🌙 Lunar Lander</option>
        </select>
      </div>
      <div style="display:flex; gap:8px; margin-top:10px;">
        <button class="btn-primary" style="padding:8px;font-size:12px;" onclick="saveBlueprint('${key}')">💾 Simpan</button>
        <button class="btn-secondary" style="padding:8px;font-size:12px;" onclick="deleteBlueprint('${key}')">🗑️ Hapus</button>
      </div>
    </div>
  `).join('');
}

function saveBlueprint(id) {
  db.child(id).update({
    name: document.getElementById(`edit_name_${id}`).value,
    link: document.getElementById(`edit_link_${id}`).value,
    cat: document.getElementById(`edit_cat_${id}`).value
  });
  showToast("✅ Blueprint diperbarui!");
}

function deleteBlueprint(id) {
  if (confirm("Hapus blueprint ini?")) {
    db.child(id).remove();
    showToast("🗑️ Blueprint dihapus!");
    setTimeout(() => loadAdminList(), 500);
  }
}

function closeAdmin() {
  document.getElementById("adminModal").classList.remove("active");
}

function openShare() {
  document.getElementById("shareModal").classList.add("active");
}

function closeShare() {
  document.getElementById("shareModal").classList.remove("active");
  document.getElementById("user").value = "";
  document.getElementById("name").value = "";
  document.getElementById("link").value = "";
  document.getElementById("cat").value = "🚀 Rocket";
  document.getElementById("img").value = "";
  document.getElementById("preview").style.display = "none";
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

// Event
document.getElementById("search").addEventListener("input", () => applyFilters());
document.getElementById("refreshBtn").addEventListener("click", () => applyFilters());
document.getElementById("adminBtn").addEventListener("click", () => openAdmin());
document.getElementById("shareBtn").addEventListener("click", () => openShare());

// Close modal on outside click
document.querySelectorAll(".modal").forEach(modal => {
  modal.addEventListener("click", (e) => {
    if (e.target === modal) modal.classList.remove("active");
  });
});
</script>
</body>
</html>
